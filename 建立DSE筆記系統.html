<script id="c" type="text/plain">
<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSE 筆記系統</title>
<style>
:root {
  --primary: #1B3A5C;
  --primary-light: #2E5090;
  --warm: #8B4513;
  --warm-bg: #FFF8E1;
  --warm-accent: #E65100;
  --cool: #2E5090;
  --cool-bg: #E3F2FD;
  --cool-accent: #1565C0;
  --peel-p: #C0392B;
  --peel-e1: #2980B9;
  --peel-e2: #27AE60;
  --peel-l: #8E44AD;
  --success: #2E7D32;
  --danger: #C0392B;
  --gray-50: #FAFAFA;
  --gray-100: #F5F5F5;
  --gray-200: #EEEEEE;
  --gray-300: #E0E0E0;
  --gray-500: #9E9E9E;
  --gray-700: #616161;
  --gray-900: #212121;
  --sidebar-w: 240px;
  --radius: 10px;
  --shadow: 0 2px 8px rgba(0,0,0,0.1);
  --shadow-lg: 0 4px 20px rgba(0,0,0,0.15);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--gray-100); color: var(--gray-900); min-height: 100vh; }

/* Sidebar */
.sidebar { position:fixed; left:0; top:0; bottom:0; width:var(--sidebar-w); background:var(--primary); color:#fff; overflow-y:auto; z-index:100; transition: transform .3s; }
.sidebar-header { padding:20px 18px 10px; text-align:center; }
.sidebar-header h1 { font-size:18px; font-weight:700; letter-spacing:1px; }
.sidebar-header .sub { font-size:11px; opacity:.6; margin-top:4px; }
.nav-section { padding:8px 14px 4px; font-size:11px; text-transform:uppercase; letter-spacing:1.5px; opacity:.5; margin-top:8px; }
.nav-item { display:flex; align-items:center; gap:10px; padding:10px 18px; cursor:pointer; border-radius:0 20px 20px 0; margin-right:10px; transition:all .2s; font-size:14px; }
.nav-item:hover { background:rgba(255,255,255,.1); }
.nav-item.active { background:rgba(255,255,255,.15); font-weight:600; }
.nav-item .icon { font-size:18px; width:24px; text-align:center; }
.nav-badge { background:var(--warm-accent); color:#fff; font-size:10px; padding:2px 7px; border-radius:10px; margin-left:auto; }

/* Main */
.main { margin-left:var(--sidebar-w); padding:24px 32px; min-height:100vh; }
.page { display:none; }
.page.active { display:block; }

/* Quote Banner */
.quote-banner { background:linear-gradient(135deg, #FFF8E1, #FFECB3); border-radius:var(--radius); padding:16px 24px; margin-bottom:20px; text-align:center; border:1px solid #FFE082; }
.quote-banner .quote-text { font-size:15px; font-weight:600; color:var(--primary); line-height:1.6; }
.quote-banner .quote-label { font-size:10px; color:var(--gray-500); margin-top:4px; }

/* Cards */
.card { background:#fff; border-radius:var(--radius); box-shadow:var(--shadow); padding:20px 24px; margin-bottom:16px; }
.card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.card-header h2 { font-size:18px; font-weight:700; color:var(--primary); }
.card-header h3 { font-size:15px; font-weight:600; color:var(--gray-700); }

/* Progress Cards */
.progress-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:16px; margin-top:12px; }
.progress-card { background:#fff; border-radius:var(--radius); box-shadow:var(--shadow); padding:16px 20px; border-left:4px solid var(--primary); position:relative; }
.progress-card.warm { border-left-color:var(--warm); }
.progress-card.cool { border-left-color:var(--cool); }
.progress-card .subject-name { font-size:16px; font-weight:700; }
.progress-card .subject-type { font-size:11px; color:var(--gray-500); margin-top:2px; }
.progress-bar-bg { height:8px; background:var(--gray-200); border-radius:4px; margin-top:10px; overflow:hidden; }
.progress-bar { height:100%; border-radius:4px; transition:width .5s; }
.progress-bar.warm { background:linear-gradient(90deg, #FF9800, #F57C00); }
.progress-bar.cool { background:linear-gradient(90deg, #42A5F5, #1565C0); }
.progress-stats { display:flex; justify-content:space-between; margin-top:8px; font-size:12px; color:var(--gray-500); }
.progress-stats .stat-val { font-weight:600; color:var(--gray-900); }

/* Buttons */
.btn { display:inline-flex; align-items:center; gap:6px; padding:8px 18px; border:none; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; transition:all .2s; }
.btn-primary { background:var(--primary); color:#fff; }
.btn-primary:hover { background:var(--primary-light); }
.btn-success { background:var(--success); color:#fff; }
.btn-danger { background:var(--danger); color:#fff; }
.btn-warm { background:var(--warm); color:#fff; }
.btn-cool { background:var(--cool); color:#fff; }
.btn-outline { background:transparent; border:2px solid var(--primary); color:var(--primary); }
.btn-outline:hover { background:var(--primary); color:#fff; }
.btn-sm { padding:5px 12px; font-size:12px; }
.btn-group { display:flex; gap:8px; flex-wrap:wrap; }

/* Forms */
.form-group { margin-bottom:14px; }
.form-label { display:block; font-size:13px; font-weight:600; color:var(--gray-700); margin-bottom:5px; }
.form-input, .form-select, .form-textarea { width:100%; padding:9px 14px; border:2px solid var(--gray-300); border-radius:8px; font-size:14px; transition:border-color .2s; font-family:inherit; }
.form-input:focus, .form-select:focus, .form-textarea:focus { outline:none; border-color:var(--primary); }
.form-textarea { min-height:80px; resize:vertical; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.form-row-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }

/* Tags */
.tag { display:inline-block; padding:3px 10px; border-radius:12px; font-size:11px; font-weight:600; margin:2px; }
.tag-mc { background:#FFF3E0; color:#E65100; }
.tag-short { background:#E8F5E9; color:#2E7D32; }
.tag-dbq { background:#E3F2FD; color:#1565C0; }
.tag-essay { background:#F3E5F5; color:#7B1FA2; }
.tag-warm { background:var(--warm-bg); color:var(--warm); }
.tag-cool { background:var(--cool-bg); color:var(--cool); }

/* Note Cards */
.note-list { display:flex; flex-direction:column; gap:14px; }
.note-item { background:#fff; border-radius:var(--radius); box-shadow:var(--shadow); padding:18px 22px; border-left:4px solid var(--warm); transition:box-shadow .2s; }
.note-item:hover { box-shadow:var(--shadow-lg); }
.note-item .note-title { font-size:15px; font-weight:700; color:var(--primary); }
.note-item .note-subtitle { font-size:13px; color:var(--gray-500); margin-top:2px; }
.note-item .note-content { margin-top:10px; font-size:13px; line-height:1.7; color:var(--gray-700); white-space:pre-wrap; }
.note-item .note-meta { display:flex; flex-wrap:wrap; align-items:center; gap:8px; margin-top:10px; }
.note-item .note-keywords { font-size:12px; color:var(--warm); background:var(--warm-bg); padding:4px 10px; border-radius:6px; display:inline-block; margin-top:6px; }
.note-item .self-test { margin-top:10px; background:var(--gray-50); border-radius:8px; padding:10px 14px; }
.note-item .self-test .q { font-size:13px; color:var(--cool); font-weight:600; }
.note-item .self-test .a { font-size:13px; color:var(--success); margin-top:6px; display:none; }
.note-item .self-test .a.show { display:block; }

/* Proficiency */
.prof { display:inline-flex; gap:3px; }
.prof-dot { width:20px; height:20px; border-radius:50%; background:var(--gray-200); }
.prof-dot.filled { background:var(--success); }
.prof-dot.warn { background:#FF9800; }

/* Practice Table */
.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:13px; }
th { background:var(--primary); color:#fff; padding:10px 14px; text-align:left; font-weight:600; white-space:nowrap; }
td { padding:10px 14px; border-bottom:1px solid var(--gray-200); vertical-align:top; }
tr:hover td { background:var(--gray-50); }
.error-badge { background:#FFEBEE; color:var(--danger); padding:3px 8px; border-radius:6px; font-size:11px; font-weight:600; }
.improve-badge { background:#E8F5E9; color:var(--success); padding:3px 8px; border-radius:6px; font-size:11px; font-weight:600; }

/* Generator */
.gen-input-area { background:linear-gradient(135deg, #E8F5E9, #C8E6C9); border-radius:var(--radius); padding:20px 24px; margin-bottom:16px; }
.gen-format-btns { display:flex; gap:10px; margin:14px 0; flex-wrap:wrap; }
.gen-format-btn { flex:1; min-width:180px; padding:14px 18px; border:3px solid transparent; border-radius:var(--radius); background:#fff; cursor:pointer; text-align:left; transition:all .2s; box-shadow:var(--shadow); }
.gen-format-btn:hover { transform:translateY(-2px); box-shadow:var(--shadow-lg); }
.gen-format-btn.selected { border-color:var(--primary); background:var(--warm-bg); }
.gen-format-btn .fmt-title { font-size:14px; font-weight:700; }
.gen-format-btn .fmt-desc { font-size:11px; color:var(--gray-500); margin-top:4px; }

/* PEEL sections */
.peel-p { border-left:4px solid var(--peel-p); background:#FFEBEE; }
.peel-e1 { border-left:4px solid var(--peel-e1); background:#E3F2FD; }
.peel-e2 { border-left:4px solid var(--peel-e2); background:#E8F5E9; }
.peel-l { border-left:4px solid var(--peel-l); background:#F3E5F5; }
.peel-section { padding:10px 16px; border-radius:0 8px 8px 0; margin:6px 0; }
.peel-section label { font-weight:700; font-size:13px; }
.peel-section textarea { margin-top:4px; background:rgba(255,255,255,.7); }

/* Export */
.export-options { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:14px; }
.export-card { background:#fff; border:2px solid var(--gray-200); border-radius:var(--radius); padding:20px; text-align:center; cursor:pointer; transition:all .2s; }
.export-card:hover { border-color:var(--primary); box-shadow:var(--shadow); }
.export-card.selected { border-color:var(--primary); background:var(--cool-bg); }
.export-card .ec-icon { font-size:36px; margin-bottom:8px; }
.export-card .ec-title { font-size:15px; font-weight:700; }
.export-card .ec-desc { font-size:11px; color:var(--gray-500); margin-top:4px; }

/* Modal */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:200; display:none; justify-content:center; align-items:flex-start; padding-top:60px; }
.modal-overlay.show { display:flex; }
.modal { background:#fff; border-radius:var(--radius); width:90%; max-width:700px; max-height:80vh; overflow-y:auto; box-shadow:var(--shadow-lg); padding:24px; }
.modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.modal-header h2 { font-size:18px; font-weight:700; color:var(--primary); }
.modal-close { width:32px; height:32px; border-radius:50%; border:none; background:var(--gray-200); cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center; }

/* Tabs */
.tab-bar { display:flex; gap:0; border-bottom:2px solid var(--gray-200); margin-bottom:16px; }
.tab-item { padding:10px 20px; cursor:pointer; font-size:14px; font-weight:500; color:var(--gray-500); border-bottom:3px solid transparent; transition:all .2s; }
.tab-item:hover { color:var(--primary); }
.tab-item.active { color:var(--primary); border-bottom-color:var(--primary); font-weight:700; }

/* Empty State */
.empty-state { text-align:center; padding:40px 20px; color:var(--gray-500); }
.empty-state .icon { font-size:48px; margin-bottom:12px; }
.empty-state .title { font-size:16px; font-weight:600; margin-bottom:6px; }
.empty-state .desc { font-size:13px; }

/* Responsive */
@media (max-width: 768px) {
  .sidebar { transform:translateX(-100%); }
  .sidebar.open { transform:translateX(0); }
  .main { margin-left:0; padding:16px; }
  .progress-grid { grid-template-columns:1fr; }
  .form-row, .form-row-3 { grid-template-columns:1fr; }
  .export-options { grid-template-columns:1fr; }
}
.mobile-toggle { display:none; position:fixed; top:12px; left:12px; z-index:150; background:var(--primary); color:#fff; border:none; width:40px; height:40px; border-radius:50%; font-size:20px; cursor:pointer; }
@media (max-width: 768px) { .mobile-toggle { display:flex; align-items:center; justify-content:center; } }

/* Print */
@media print { .sidebar, .mobile-toggle { display:none!important; } .main { margin-left:0; } }
</style>
</head>
<body>

<button class="mobile-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>

<!-- Sidebar -->
<nav class="sidebar">
  <div class="sidebar-header">
    <h1>📚 DSE筆記系統</h1>
    <div class="sub">2028 DSE 備戰工具</div>
  </div>
  <div class="nav-section">總覽</div>
  <div class="nav-item active" data-page="dashboard"><span class="icon">🏠</span>主頁</div>
  <div class="nav-section">筆記类</div>
  <div class="nav-item" data-page="generator"><span class="icon">📝</span>筆記生成器</div>
  <div class="nav-item" data-page="notes-chhist"><span class="icon">📖</span>中史筆記</div>
  <div class="nav-item" data-page="notes-whist"><span class="icon">📖</span>世史筆記</div>
  <div class="nav-item" data-page="notes-csd"><span class="icon">📖</span>C&SD 筆記</div>
  <div class="nav-section">操練类</div>
  <div class="nav-item" data-page="prac-eng"><span class="icon">✏️</span>英文操練</div>
  <div class="nav-item" data-page="prac-math"><span class="icon">✏️</span>數學操練</div>
  <div class="nav-item" data-page="prac-chi"><span class="icon">✏️</span>中文操練</div>
  <div class="nav-section">工具</div>
  <div class="nav-item" data-page="dse-stats"><span class="icon">📊</span>DSE題型分佈</div>
  <div class="nav-item" data-page="export"><span class="icon">📤</span>匯出筆記</div>
</nav>

<div class="main">

<!-- ============ DASHBOARD ============ -->
<div class="page active" id="page-dashboard">
  <div class="quote-banner">
    <div class="quote-text" id="quote-text">💪 每多溫一頁，就多一分把握。唔急，慢慢嚟！div>
    <div class="quote-label">💬 每日鼓勵（每次刷新隨機更新）</div>
  </div>
  <div class="card">
    <div class="card-header"><h2>📊 六科進度總覽</h2></div>
    <div class="progress-grid" id="progress-grid"></div>
  </div>
</div>

<!-- ============ NOTE GENERATOR ============ -->
<div class="page" id="page-generator">
  <div class="card">
    <div class="card-header"><h2>📝 筆記生成器</h2></div>
    <p style="font-size:13px;color:var(--gray-500);margin-bottom:14px;">輸入事件資料，選擇筆記格式，系統幫你生成結構化筆記模板</p>
    <div class="gen-input-area">
      <div class="form-row">
        <div class="form-group"><label class="form-label">科目</label>
          <select class="form-select" id="gen-subject"><option value="中史">中史</option><option value="世史">世史</option><option value="C&SD">C&SD</option></select>
        </div>
        <div class="form-group"><label class="form-label">事件/課題標題</label><input class="form-input" id="gen-title" placeholder="如：秦朝統一措施"></div>
      </div>
      <div class="form-row-3">
        <div class="form-group"><label class="form-label">時間/朝代</label><input class="form-input" id="gen-time" placeholder="如：公元前221年"></div>
        <div class="form-group"><label class="form-label">相關人物</label><input class="form-input" id="gen-people" placeholder="如：秦始皇、李斯"></div>
        <div class="form-group"><label class="form-label">地區/國家</label><input class="form-input" id="gen-region" placeholder="如：中國"></div>
      </div>
    </div>
    <label class="form-label">選擇筆記格式</label>
    <div class="gen-format-btns">
      <div class="gen-format-btn selected" data-fmt="1"><div class="fmt-title">① 事實描述</div><div class="fmt-desc">背景→經過→關鍵細節→影響<br>適合首次溫習新課題</div></div>
      <div class="gen-format-btn" data-fmt="2"><div class="fmt-title">② 原因-過程-影響</div><div class="fmt-desc">政治/經濟/社會/外部原因分析<br>適合深入理解因果</div></div>
      <div class="gen-format-btn" data-fmt="3"><div class="fmt-title">③ DSE PEEL結構</div><div class="fmt-desc">P論點→E論據→E解釋→L扣題<br>適合準備DSE論述題</div></div>
      <div class="gen-format-btn" data-fmt="4"><div class="fmt-title">④ 混合型</div><div class="fmt-desc">事實+因果+PEEL 三合一<br>適合重點高頻課題</div></div>
    </div>
    <div class="btn-group" style="margin-top:12px;">
      <button class="btn btn-primary" onclick="generateNote()">🪄 生成筆記模板</button>
      <button class="btn btn-success" onclick="saveGeneratedNote()">💾 儲存到筆記表</button>
    </div>
  </div>
  <div class="card" id="gen-output" style="display:none;">
    <div class="card-header"><h2>📄 生成結果</h2><button class="btn btn-sm btn-outline" onclick="copyGenOutput()">📋 複製</button></div>
    <div id="gen-result-content"></div>
  </div>
</div>

<!-- ============ NOTES PAGES (shared template) ============ -->
<div class="page" id="page-notes-chhist">
  <div class="card">
    <div class="card-header"><h2>📖 中史筆記</h2>
      <div class="btn-group">
        <button class="btn btn-sm btn-warm" onclick="openNoteModal('中史')">+ 新增筆記</button>
        <select class="form-select" style="width:auto;padding:5px 10px;font-size:12px;" onchange="filterNotes('chhist',this.value)">
          <option value="all">全部</option><option value="dse">只看DSE曾出現</option><option value="low">只看熟練度1-2</option>
        </select>
      </div>
    </div>
    <div class="note-list" id="note-list-chhist"></div>
  </div>
</div>

<div class="page" id="page-notes-whist">
  <div class="card">
    <div class="card-header"><h2>📖 世史筆記</h2>
      <div class="btn-group">
        <button class="btn btn-sm btn-warm" onclick="openNoteModal('世史')">+ 新增筆記</button>
        <select class="form-select" style="width:auto;padding:5px 10px;font-size:12px;" onchange="filterNotes('whist',this.value)">
          <option value="all">全部</option><option value="dse">只看DSE曾出現</option><option value="low">只看熟練度1-2</option>
        </select>
      </div>
    </div>
    <div class="note-list" id="note-list-whist"></div>
  </div>
</div>

<div class="page" id="page-notes-csd">
  <div class="card">
    <div class="card-header"><h2>📖 C&SD 筆記</h2>
      <div class="btn-group">
        <button class="btn btn-sm btn-warm" onclick="openNoteModal('C&SD')">+ 新增筆記</button>
        <select class="form-select" style="width:auto;padding:5px 10px;font-size:12px;" onchange="filterNotes('csd',this.value)">
          <option value="all">全部</option><option value="dse">只看DSE曾出現</option><option value="low">只看熟練度1-2</option>
        </select>
      </div>
    </div>
    <div class="note-list" id="note-list-csd"></div>
  </div>
</div>

<!-- ============ PRACTICE PAGES ============ -->
<div class="page" id="page-prac-eng">
  <div class="card">
    <div class="card-header"><h2>✏️ 英文操練</h2><button class="btn btn-sm btn-cool" onclick="openPracModal('英文')">+ 新增記錄</button></div>
    <div class="table-wrap"><table id="prac-table-eng"><thead><tr><th>日期</th><th>類型</th><th>卷別</th><th>來源</th><th>題號</th><th>得分</th><th>錯誤類型</th><th>錯誤詳情</th><th>改善行動</th><th>覆檢</th><th></th></tr></thead><tbody></tbody></table></div>
  </div>
</div>

<div class="page" id="page-prac-math">

// ===== DASHBOARD =====
function renderDashboard(){
  document.getElementById('quote-text').textContent=quotes[Math.floor(Math.random()*quotes.length)];
  const notes=getData(KEYS.notes);
  const prac=getData(KEYS.prac);
  const subjects=[
    {key:'chhist',name:'中史',type:'筆記类',total:30},
    {key:'whist',name:'世史',type:'筆記类',total:25},
    {key:'csd',name:'C&SD',type:'筆記类',total:20},
    {key:'eng',name:'英文',type:'操練类',total:50},
    {key:'math',name:'數學',type:'操練类',total:40},
    {key:'chi',name:'中文',type:'操練类',total:45},
  ];
  const grid=document.getElementById('progress-grid');
  grid.innerHTML=subjects.map(s=>{
    const items=notes[s.key]||[];
    const pItems=prac[s.key]||[];
    const done=items.length;
    const pct=Math.round((done/s.total)*100);
    const isWarm=s.type==='筆記类';
    const dseCount=items.filter(n=>n.dse==='是').length;
    const lowCount=items.filter(n=>n.prof&&parseInt(n.prof)<=2).length;
    const errCount=pItems.filter(p=>p.errorType).length;
    return `<div class="progress-card ${isWarm?'warm':'cool'}">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div><div class="subject-name">${s.name}</div><div class="subject-type">${s.type} ${isWarm?'📖':'✏️'}</div></div>
        <span class="tag ${isWarm?'tag-warm':'tag-cool'}">${pct}%</span>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar ${isWarm?'warm':'cool'}" style="width:${pct}%"></div></div>
      <div class="progress-stats">
        <span>完成 <span class="stat-val">${done}</span>/${s.total}</span>
        ${isWarm?`<span>DSE題 <span class="stat-val">${dseCount}</span></span><span>弱項 <span class="stat-val">${lowCount}</span></span>`:`<span>錯題 <span class="stat-val">${errCount}</span></span>`}
      </div>
    </div>`;
  }).join('');
}

// ===== NOTES =====
const subjMap={chhist:'中史',whist:'世史',csd:'C&SD'};
let noteFilter={chhist:'all',whist:'all',csd:'all'};
function filterNotes(key,val){ noteFilter[key]=val; renderNotes(key); }

function renderNotes(key){
  const notes=getData(KEYS.notes)[key]||[];
  const f=noteFilter[key]||'all';
  let filtered=notes;
  if(f==='dse') filtered=notes.filter(n=>n.dse==='是');
  if(f==='low') filtered=notes.filter(n=>n.prof&&parseInt(n.prof)<=2);
  const el=document.getElementById('note-list-'+key);
  if(!filtered.length){ el.innerHTML='<div class="empty-state"><div class="icon">📖</div><div class="title">仲未有筆記</div><div class="desc">按「+ 新增筆記」開始記錄</div></div>'; return; }
  el.innerHTML=filtered.map(n=>{
    const tags=(n.dseType||'').split('/').filter(Boolean).map(t=>{
      const cls={'MC':'tag-mc','短答':'tag-short','DBQ':'tag-dbq','論述':'tag-essay'}[t]||'tag-warm';
      return `<span class="tag ${cls}">${t}</span>`;
    }).join('');
    const prof=n.prof?parseInt(n.prof):0;
    const dots=[1,2,3,4,5].map(i=>`<span class="prof-dot ${i<=prof?(i<=2?'warn':'filled'):''}"></span>`).join('');
    return `<div class="note-item">
      <div style="display:flex;justify-content:space-between;align-items:start;">
        <div><div class="note-title">${n.topic}</div><div class="note-subtitle">${n.subtopic}</div></div>
        <div class="btn-group"><button class="btn btn-sm btn-outline" onclick="editNote('${key}','${n.id}')">✏️</button><button class="btn btn-sm btn-danger" onclick="deleteNote('${key}','${n.id}')">🗑️</button></div>
      </div>
      ${n.content?`<div class="note-content">${n.content}</div>`:''}
      ${n.keywords?`<div class="note-keywords">🔑 ${n.keywords}</div>`:''}
      <div class="note-meta">
        ${n.dse==='是'?`<span class="tag" style="background:#FFEBEE;color:var(--danger);">📊 DSE已出現 ${n.dseYear||''}</span>`:''}
        ${tags}
        <div class="prof" title="熟練度 ${prof}/5">${dots}</div>
      </div>
      ${n.testQ?`<div class="self-test"><div class="q">❓ ${n.testQ}</div><div class="a" id="ans-${n.id}">💡 ${n.testA||''}</div><button class="btn btn-sm btn-outline" style="margin-top:6px;" onclick="document.getElementById('ans-${n.id}').classList.toggle('show');this.textContent=this.textContent==='👁️ 顯示答案'?'🙈 隱藏答案':'👁️ 顯示答案'">👁️ 顯示答案</button></div>`:''}
      ${n.remarks?`<div style="margin-top:8px;font-size:12px;color:var(--gray-500);">📌 ${n.remarks}</div>`:''}
    </div>`;
  }).join('');
}

function openNoteModal(subject, editData){
  document.getElementById('note-edit-subject').value=subject;
  document.getElementById('note-modal-title').textContent=editData?'編輯筆記':'新增筆記 — '+subject;
  const sKey=subject==='中史'?'chhist':subject==='世史'?'whist':'csd';
  document.getElementById('note-edit-id').value=editData?editData.id:'';
  ['topic','subtopic','content','keywords','dse','dseType','dseYear','testQ','testA','prof','remarks'].forEach(f=>{
    const el=document.getElementById('nm-'+f.charAt(0).toLowerCase()+f.slice(1).replace(/([A-Z])/g,(m,l)=>l.toLowerCase()));
    // Map field names to element IDs
  });
  if(editData){
    document.getElementById('nm-topic').value=editData.topic||'';
    document.getElementById('nm-subtopic').value=editData.subtopic||'';
    document.getElementById('nm-content').value=editData.content||'';
    document.getElementById('nm-keywords').value=editData.keywords||'';
    document.getElementById('nm-dse').value=editData.dse||'否';
    document.getElementById('nm-dse-type').value=editData.dseType||'';
    document.getElementById('nm-dse-year').value=editData.dseYear||'';
    document.getElementById('nm-testq').value=editData.testQ||'';
    document.getElementById('nm-testa').value=editData.testA||'';
    document.getElementById('nm-prof').value=editData.prof||'1';
    document.getElementById('nm-remarks').value=editData.remarks||'';
  } else {
    ['nm-topic','nm-subtopic','nm-content','nm-keywords','nm-dse-type','nm-dse-year','nm-testq','nm-testa','nm-remarks'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('nm-dse').value='否';
    document.getElementById('nm-prof').value='1';
  }
  document.getElementById('note-modal').classList.add('show');
}

function saveNote(){
  const data=getData(KEYS.notes);
  const subject=document.getElementById('note-edit-subject').value;
  const sKey=subject==='中史'?'chhist':subject==='世史'?'whist':'csd';
  if(!data[sKey]) data[sKey]=[];
  const note={
    id:document.getElementById('note-edit-id').value||uid(),
    topic:document.getElementById('nm-topic').value,
    subtopic:document.getElementById('nm-subtopic').value,
    content:document.getElementById('nm-content').value,
    keywords:document.getElementById('nm-keywords').value,
    dse:document.getElementById('nm-dse').value,
    dseType:document.getElementById('nm-dse-type').value,
    dseYear:document.getElementById('nm-dse-year').value,
    testQ:document.getElementById('nm-testq').value,
    testA:document.getElementById('nm-testa').value,
    prof:document.getElementById('nm-prof').value,
    remarks:document.getElementById('nm-remarks').value,
  };
  const idx=data[sKey].findIndex(n=>n.id===note.id);
  if(idx>=0) data[sKey][idx]=note; else data[sKey].push(note);
  setData(KEYS.notes,data);
  closeModal('note-modal');
  renderNotes(sKey);
}

function editNote(key,id){
  const notes=getData(KEYS.notes)[key]||[];
  const n=notes.find(x=>x.id===id);
  if(n) openNoteModal(subjMap[key],n);
}

function deleteNote(key,id){
  if(!confirm('確定刪除呢條筆記？')) return;
  const data=getData(KEYS.notes);
  data[key]=data[key].filter(n=>n.id!==id);
  setData(KEYS.notes,data);
  renderNotes(key);
}

function openPracModal(subject, editData){
  document.getElementById('prac-edit-subject').value=subject;
  document.getElementById('prac-modal-title').textContent=editData?'編輯操練記錄':'新增操練記錄 — '+subject;
  document.getElementById('prac-edit-id').value=editData?editData.id:'';
  const fields=pracFields[subject];
  document.getElementById('prac-form-fields').innerHTML=fields.map(f=>{
    const val=editData?editData[f.id]||'':'';
    if(f.type==='select') return `<div class="form-group"><label class="form-label">${f.label}</label><select class="form-select" id="pf-${f.id}">${f.opts.map(o=>`<option value="${o}" ${o===val?'selected':''}>${o||'—'}</option>`).join('')}</select></div>`;
    if(f.type==='textarea') return `<div class="form-group" style="grid-column:span 2"><label class="form-label">${f.label}</label><textarea class="form-textarea" id="pf-${f.id}" rows="2">${val}</textarea></div>`;
    return `<div class="form-group"><label class="form-label">${f.label}</label><input class="form-input" id="pf-${f.id}" type="${f.type==='date'?'date':'text'}" value="${val}"></div>`;
  }).join('');
  if(!editData && fields.find(f=>f.id==='date')){
    document.getElementById('pf-date').value=new Date().toISOString().slice(0,10);
  }
  // Make it a grid layout
  document.getElementById('prac-form-fields').style.display='grid';
  document.getElementById('prac-form-fields').style.gridTemplateColumns='1fr 1fr';
  document.getElementById('prac-form-fields').style.gap='10px';
  document.getElementById('prac-modal').classList.add('show');
}

function savePrac(){
  const data=getData(KEYS.prac);
  const subject=document.getElementById('prac-edit-subject').value;
  const sKey=subject==='英文'?'eng':subject==='數學'?'math':'chi';
  if(!data[sKey]) data[sKey]=[];
  const fields=pracFields[subject];
  const record={id:document.getElementById('prac-edit-id').value||uid()};
  fields.forEach(f=>{
    const el=document.getElementById('pf-'+f.id);
    record[f.id]=el?el.value:'';
  });
  const idx=data[sKey].findIndex(p=>p.id===record.id);
  if(idx>=0) data[sKey][idx]=record; else data[sKey].push(record);
  setData(KEYS.prac,data);
  closeModal('prac-modal');
  renderPrac(sKey);
}

function renderPrac(key){
  const records=getData(KEYS.prac)[key]||[];
  const subject=pracMap[key];
  const tbody=document.querySelector('#prac-table-'+key+' tbody');
  if(!records.length){ tbody.innerHTML='<tr><td colspan="12" style="text-align:center;color:var(--gray-500);padding:30px;">仲未有操練記錄，按「+ 新增記錄」開始</td></tr>'; return; }
  tbody.innerHTML=records.map(r=>{
    const editBtn=`<button class="btn btn-sm btn-outline" onclick="editPrac('${key}','${r.id}')">✏️</button>`;
    const delBtn=`<button class="btn btn-sm btn-danger" onclick="deletePrac('${key}','${r.id}')">🗑️</button>`;
    if(key==='math'){
      return `<tr>
        <td>${r.date||''}</td><td>${r.topic||''}</td><td>${r.paper||''}</td><td>${r.source||''}</td>
        <td>${r.qNum||''}</td><td>${r.qType||''}</td><td>${r.correct==='是'?'✅':'❌'}</td>
        <td>${r.errorType?`<span class="error-badge">${r.errorType}</span>`:''}</td>
        <td>${r.errorDetail||''}</td><td>${r.solution||''}</td>
        <td>${r.reviewed==='是'?'✅':'⬜'}</td><td>${editBtn}${delBtn}</td></tr>`;
    }
    return `<tr>
      <td>${r.date||''}</td><td>${r.type||''}</td><td>${r.paper||''}</td><td>${r.source||''}</td>
      <td>${r.qNum||''}</td><td>${r.score||''}</td>
      <td>${r.errorType?`<span class="error-badge">${r.errorType}</span>`:''}</td>
      <td>${r.errorDetail||''}</td>
      <td>${r.improve?`<span class="improve-badge">${r.improve}</span>`:''}</td>
      <td>${r.reviewed==='是'?'✅':'⬜'}</td><td>${editBtn}${delBtn}</td></tr>`;
  }).join('');
}

function editPrac(key,id){
  const records=getData(KEYS.prac)[key]||[];
  const r=records.find(x=>x.id===id);
  if(r) openPracModal(pracMap[key],r);
}

function deletePrac(key,id){
  if(!confirm('確定刪除呢條記錄？')) return;
  const data=getData(KEYS.prac);
  data[key]=data[key].filter(p=>p.id!==id);
  setData(KEYS.prac,data);
  renderPrac(key);
}

// ===== DSE STATS =====
function renderStats(key){
  const notes=getData(KEYS.notes)[key]||[];
  const tbody=document.querySelector('#stats-table tbody');
  if(!notes.length){ tbody.innerHTML='<tr><td colspan="6" style="text-align:center;color:var(--gray-500);">暫無數據</td></tr>'; return; }
  // Aggregate by topic
  const topicMap={};
  notes.forEach(n=>{
    const t=n.topic||'未分類';
    if(!topicMap[t]) topicMap[t]={mc:0,short:0,dbq:0,essay:0};
    const types=(n.dseType||'').split('/');
    if(types.includes('MC')) topicMap[t].mc++;
    if(types.includes('短答')) topicMap[t].short++;
    if(types.includes('DBQ')) topicMap[t].dbq++;
    if(types.includes('論述')) topicMap[t].essay++;
  });
  tbody.innerHTML=Object.entries(topicMap).map(([topic,counts])=>{
    const total=counts.mc+counts.short+counts.dbq+counts.essay;
    return `<tr><td><strong>${topic}</strong></td><td>${counts.mc}</td><td>${counts.short}</td><td>${counts.dbq}</td><td>${counts.essay}</td><td><strong>${total}</strong></td></tr>`;
  }).join('');
}

function showStatTab(key,el){
  document.querySelectorAll('#page-dse-stats .tab-item').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderStats(key);
}

function saveGeneratedNote(){
  const subject=document.getElementById('gen-subject').value;
  const title=document.getElementById('gen-title').value||'未命名課題';
  const sKey=subject==='中史'?'chhist':subject==='世史'?'whist':'csd';
  // Collect all textarea/input values from the generated form
  const contentParts=[];
  document.querySelectorAll('#gen-result-content textarea, #gen-result-content input[type=text]').forEach(el=>{
    if(el.value.trim()){
      const label=el.previousElementSibling||el.parentElement.querySelector('label');
      const labelText=label?label.textContent.replace(/[：:]$/,'').trim():'';
      if(labelText) contentParts.push(`【${labelText}】${el.value.trim()}`);
      else contentParts.push(el.value.trim());
    }
  });
  const data=getData(KEYS.notes);
  if(!data[sKey]) data[sKey]=[];
  data[sKey].push({
    id:uid(), topic:title, subtopic:document.getElementById('gen-time').value||'',
    content:contentParts.join('\n'), keywords:document.getElementById('gen-people').value||'',
    dse:'否', dseType:'', dseYear:'', testQ:'', testA:'', prof:'1', remarks:'由筆記生成器建立'
  });
  setData(KEYS.notes,data);
  alert('✅ 已儲存到'+subject+'筆記！');
}

function selectExport(el){

function doExport(){
  const subject=document.getElementById('exp-subject').value;
  const filter=document.getElementById('exp-filter').value;
  const notes=getData(KEYS.notes);
  const prac=getData(KEYS.prac);
  const sKeys=subject==='全部'?['chhist','whist','csd']:[subject==='中史'?'chhist':subject==='世史'?'whist':'csd'];
  const pKeys=subject==='全部'?['eng','math','chi']:[];

  let html=`<html><head><meta charset="UTF-8"><title>DSE筆記匯出</title>
  <style>body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;padding:30px;color:#333;max-width:800px;margin:0 auto;}
  h1{color:#1B3A5C;text-align:center;border-bottom:3px solid #1B3A5C;padding-bottom:10px;}
  h2{color:#8B4513;margin-top:24px;} h3{color:#2E5090;margin-top:16px;}
  .note{border-left:4px solid #8B4513;padding:10px 16px;margin:10px 0;background:#FFF8E1;border-radius:0 8px 8px 0;}
  .note .title{font-weight:700;font-size:15px;color:#1B3A5C;} .note .content{margin-top:6px;white-space:pre-wrap;font-size:13px;line-height:1.7;}
  .dse-tag{display:inline-block;background:#FFEBEE;color:#C0392B;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;margin:2px;}
  .self-test{background:#F5F5F5;padding:8px 12px;border-radius:6px;margin-top:8px;font-size:13px;}
  table{width:100%;border-collapse:collapse;margin-top:10px;font-size:12px;}
  th{background:#1B3A5C;color:#fff;padding:8px;text-align:left;} td{padding:8px;border-bottom:1px solid #ddd;}
  .error{color:#C0392B;font-weight:600;} .improve{color:#2E7D32;font-weight:600;}
  .meta{font-size:11px;color:#999;margin-top:10px;text-align:center;}
  </style></head><body>`;
  html+=`<h1>DSE 筆記匯出</h1><div class="meta">匯出日期：${new Date().toLocaleString('zh-HK')} | 科目：${subject} | 篩選：${filter==='all'?'全部':filter==='dse'?'DSE曾出現':'熟練度1-2'}</div>`;

  sKeys.forEach(key=>{
    let items=notes[key]||[];
    if(filter==='dse') items=items.filter(n=>n.dse==='是');
    if(filter==='low') items=items.filter(n=>n.prof&&parseInt(n.prof)<=2);
    if(!items.length) return;
    html+=`<h2>📖 ${subjMap[key]} 筆記</h2>`;
    items.forEach(n=>{
      html+=`<div class="note"><div class="title">${n.topic} — ${n.subtopic}</div>`;
      if(n.content) html+=`<div class="content">${n.content}</div>`;
      if(n.keywords) html+=`<div style="margin-top:4px;font-size:12px;color:#8B4513;">🔑 ${n.keywords}</div>`;
      if(n.dse==='是'){
        html+=`<div style="margin-top:4px;">`;
        html+=`<span class="dse-tag">📊 DSE已出現 ${n.dseYear||''}</span>`;
        (n.dseType||'').split('/').filter(Boolean).forEach(t=>html+=`<span class="dse-tag">${t}</span>`);
        html+=`</div>`;
      }
      if(n.testQ) html+=`<div class="self-test">❓ ${n.testQ}<br>💡 ${n.testA||''}</div>`;
      if(n.prof) html+=`<div style="margin-top:4px;font-size:12px;color:#666;">熟練度：${n.prof}/5</div>`;
      html+=`</div>`;
    });
  });

  pKeys.forEach(key=>{
    const records=prac[key]||[];
    if(!records.length) return;
    html+=`<h2>✏️ ${pracMap[key]} 操練記錄</h2><table><tr><th>日期</th><th>類型</th><th>題號</th><th>得分</th><th>錯誤</th><th>改善</th></tr>`;
    records.forEach(r=>{
      html+=`<tr><td>${r.date||''}</td><td>${r.type||r.topic||''}</td><td>${r.qNum||''}</td><td>${r.score||''}</td><td class="error">${r.errorType||''}</td><td class="improve">${r.improve||r.solution||''}</td></tr>`;
    });
    html+=`</table>`;
  });

  html+=`</body></html>`;

  if(exportType==='print'){
    const w=window.open('','_blank');
    w.document.write(html);
    w.document.close();
    setTimeout(()=>w.print(),500);
  } else {
    const blob=new Blob([html],{type:'text/html'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download=`DSE筆記_${subject}_${new Date().toISOString().slice(0,10)}.html`;
    a.click();
    URL.revokeObjectURL(url);
    alert('✅ 已下載！用瀏覽器開啟後可按 Ctrl+P 列印為 PDF');
  }
}
