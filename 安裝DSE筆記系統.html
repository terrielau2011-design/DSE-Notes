<script>
function build(){

}

<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSE 筆記系統</title>
<style>
:root{--primary:#1B3A5C;--primary-light:#2E5090;--warm:#8B4513;--warm-bg:#FFF8E1;--warm-accent:#E65100;--cool:#2E5090;--cool-bg:#E3F2FD;--cool-accent:#1565C0;--peel-p:#C0392B;--peel-e1:#2980B9;--peel-e2:#27AE60;--peel-l:#8E44AD;--success:#2E7D32;--danger:#C0392B;--gray-50:#FAFAFA;--gray-100:#F5F5F5;--gray-200:#EEEEEE;--gray-300:#E0E0E0;--gray-500:#9E9E9E;--gray-700:#616161;--gray-900:#212121;--sidebar-w:240px;--radius:10px;--shadow:0 2px 8px rgba(0,0,0,.1);--shadow-lg:0 4px 20px rgba(0,0,0,.15)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--gray-100);color:var(--gray-900);min-height:100vh}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-w);background:var(--primary);color:#fff;overflow-y:auto;z-index:100;transition:transform .3s}
.sidebar-header{padding:20px 18px 10px;text-align:center}
.sidebar-header h1{font-size:18px;font-weight:700;letter-spacing:1px}
.sidebar-header .sub{font-size:11px;opacity:.6;margin-top:4px}
.nav-section{padding:8px 14px 4px;font-size:11px;text-transform:uppercase;letter-spacing:1.5px;opacity:.5;margin-top:8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 18px;cursor:pointer;border-radius:0 20px 20px 0;margin-right:10px;transition:all .2s;font-size:14px}
.nav-item:hover{background:rgba(255,255,255,.1)}
.nav-item.active{background:rgba(255,255,255,.15);font-weight:600}
.nav-item .icon{font-size:18px;width:24px;text-align:center}
.main{margin-left:var(--sidebar-w);padding:24px 32px;min-height:100vh}
.page{display:none}.page.active{display:block}
.quote-banner{background:linear-gradient(135deg,#FFF8E1,#FFECB3);border-radius:var(--radius);padding:16px 24px;margin-bottom:20px;text-align:center;border:1px solid #FFE082}
.quote-banner .quote-text{font-size:15px;font-weight:600;color:var(--primary);line-height:1.6}
.quote-banner .quote-label{font-size:10px;color:var(--gray-500);margin-top:4px}
.card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 24px;margin-bottom:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-header h2{font-size:18px;font-weight:700;color:var(--primary)}
.progress-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-top:12px}
.progress-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 20px;border-left:4px solid var(--primary)}
.progress-card.warm{border-left-color:var(--warm)}.progress-card.cool{border-left-color:var(--cool)}
.progress-card .subject-name{font-size:16px;font-weight:700}
.progress-card .subject-type{font-size:11px;color:var(--gray-500);margin-top:2px}
.progress-bar-bg{height:8px;background:var(--gray-200);border-radius:4px;margin-top:10px;overflow:hidden}
.progress-bar{height:100%;border-radius:4px;transition:width .5s}
.progress-bar.warm{background:linear-gradient(90deg,#FF9800,#F57C00)}.progress-bar.cool{background:linear-gradient(90deg,#42A5F5,#1565C0)}
.progress-stats{display:flex;justify-content:space-between;margin-top:8px;font-size:12px;color:var(--gray-500)}
.progress-stats .stat-val{font-weight:600;color:var(--gray-900)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-light)}
.btn-success{background:var(--success);color:#fff}.btn-danger{background:var(--danger);color:#fff}
.btn-warm{background:var(--warm);color:#fff}.btn-cool{background:var(--cool);color:#fff}
.btn-outline{background:transparent;border:2px solid var(--primary);color:var(--primary)}.btn-outline:hover{background:var(--primary);color:#fff}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-group{display:flex;gap:8px;flex-wrap:wrap}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--gray-700);margin-bottom:5px}
.form-input,.form-select,.form-textarea{width:100%;padding:9px 14px;border:2px solid var(--gray-300);border-radius:8px;font-size:14px;transition:border-color .2s;font-family:inherit}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--primary)}
.form-textarea{min-height:80px;resize:vertical}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.tag{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;margin:2px}
.tag-mc{background:#FFF3E0;color:#E65100}.tag-short{background:#E8F5E9;color:#2E7D32}
.tag-dbq{background:#E3F2FD;color:#1565C0}.tag-essay{background:#F3E5F5;color:#7B1FA2}
.tag-warm{background:var(--warm-bg);color:var(--warm)}.tag-cool{background:var(--cool-bg);color:var(--cool)}
.note-list{display:flex;flex-direction:column;gap:14px}
.note-item{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 22px;border-left:4px solid var(--warm);transition:box-shadow .2s}
.note-item:hover{box-shadow:var(--shadow-lg)}
.note-item .note-title{font-size:15px;font-weight:700;color:var(--primary)}
.note-item .note-subtitle{font-size:13px;color:var(--gray-500);margin-top:2px}
.note-item .note-content{margin-top:10px;font-size:13px;line-height:1.7;color:var(--gray-700);white-space:pre-wrap}
.note-item .note-meta{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-top:10px}
.note-item .note-keywords{font-size:12px;color:var(--warm);background:var(--warm-bg);padding:4px 10px;border-radius:6px;display:inline-block;margin-top:6px}
.note-item .self-test{margin-top:10px;background:var(--gray-50);border-radius:8px;padding:10px 14px}
.note-item .self-test .q{font-size:13px;color:var(--cool);font-weight:600}
.note-item .self-test .a{font-size:13px;color:var(--success);margin-top:6px;display:none}
.note-item .self-test .a.show{display:block}
.prof{display:inline-flex;gap:3px}
.prof-dot{width:20px;height:20px;border-radius:50%;background:var(--gray-200)}
.prof-dot.filled{background:var(--success)}.prof-dot.warn{background:#FF9800}
.table-wrap{overflow-x:auto}table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--primary);color:#fff;padding:10px 14px;text-align:left;font-weight:600;white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid var(--gray-200);vertical-align:top}
tr:hover td{background:var(--gray-50)}
.error-badge{background:#FFEBEE;color:var(--danger);padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600}
.improve-badge{background:#E8F5E9;color:var(--success);padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600}
.gen-input-area{background:linear-gradient(135deg,#E8F5E9,#C8E6C9);border-radius:var(--radius);padding:20px 24px;margin-bottom:16px}
.gen-format-btns{display:flex;gap:10px;margin:14px 0;flex-wrap:wrap}
.gen-format-btn{flex:1;min-width:180px;padding:14px 18px;border:3px solid transparent;border-radius:var(--radius);background:#fff;cursor:pointer;text-align:left;transition:all .2s;box-shadow:var(--shadow)}
.gen-format-btn:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.gen-format-btn.selected{border-color:var(--primary);background:var(--warm-bg)}
.gen-format-btn .fmt-title{font-size:14px;font-weight:700}
.gen-format-btn .fmt-desc{font-size:11px;color:var(--gray-500);margin-top:4px}
.peel-p{border-left:4px solid var(--peel-p);background:#FFEBEE}
.peel-e1{border-left:4px solid var(--peel-e1);background:#E3F2FD}
.peel-e2{border-left:4px solid var(--peel-e2);background:#E8F5E9}
.peel-l{border-left:4px solid var(--peel-l);background:#F3E5F5}
.peel-section{padding:10px 16px;border-radius:0 8px 8px 0;margin:6px 0}
.peel-section label{font-weight:700;font-size:13px}
.peel-section textarea{margin-top:4px;background:rgba(255,255,255,.7)}
.export-card{background:#fff;border:2px solid var(--gray-200);border-radius:var(--radius);padding:20px;text-align:center;cursor:pointer;transition:all .2s}
.export-card:hover{border-color:var(--primary);box-shadow:var(--shadow)}
.export-card.selected{border-color:var(--primary);background:var(--cool-bg)}
.export-card .ec-icon{font-size:36px;margin-bottom:8px}
.export-card .ec-title{font-size:15px;font-weight:700}
.export-card .ec-desc{font-size:11px;color:var(--gray-500);margin-top:4px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;justify-content:center;align-items:flex-start;padding-top:60px}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:var(--radius);width:90%;max-width:700px;max-height:80vh;overflow-y:auto;box-shadow:var(--shadow-lg);padding:24px}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-header h2{font-size:18px;font-weight:700;color:var(--primary)}
.modal-close{width:32px;height:32px;border-radius:50%;border:none;background:var(--gray-200);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.tab-bar{display:flex;gap:0;border-bottom:2px solid var(--gray-200);margin-bottom:16px}
.tab-item{padding:10px 20px;cursor:pointer;font-size:14px;font-weight:500;color:var(--gray-500);border-bottom:3px solid transparent;transition:all .2s}
.tab-item:hover{color:var(--primary)}.tab-item.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:700}
.empty-state{text-align:center;padding:40px 20px;color:var(--gray-500)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state .title{font-size:16px;font-weight:600;margin-bottom:6px}
.empty-state .desc{font-size:13px}
@media(max-width:768px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main{margin-left:0;padding:16px}.progress-grid{grid-template-columns:1fr}.form-row,.form-row-3{grid-template-columns:1fr}}
.mobile-toggle{display:none;position:fixed;top:12px;left:12px;z-index:150;background:var(--primary);color:#fff;border:none;width:40px;height:40px;border-radius:50%;font-size:20px;cursor:pointer}
@media(max-width:768px){.mobile-toggle{display:flex;align-items:center;justify-content:center}}
</style>
</head>

<nav class="sidebar">

<div class="card"><div class="card-header"><h2>📝 筆記生成器</h2></div>
<p style="font-size:13px;color:var(--gray-500);margin-bottom:14px;">輸入事件資料，選擇筆記格式，系統幫你生成結構化筆記模板</p>
<div class="gen-input-area">
<div class="form-row"><div class="form-group"><label class="form-label">科目</label><select class="form-select" id="gen-subject"><option value="中史">中史</option><option value="世史">世史</option><option value="C&SD">C&SD</option></select></div><div class="form-group"><label class="form-label">事件/課題標題</label><input class="form-input" id="gen-title" placeholder="如：秦朝統一措施"></div></div>
<div class="form-row-3"><div class="form-group"><label class="form-label">時間/朝代</label><input class="form-input" id="gen-time" placeholder="如：公元前221年"></div><div class="form-group"><label class="form-label">相關人物</label><input class="form-input" id="gen-people" placeholder="如：秦始皇、李斯"></div><div class="form-group"><label class="form-label">地區/國家</label><input class="form-input" id="gen-region" placeholder="如：中國"></div></div>
</div>
<label class="form-label">選擇筆記格式</label>

<div class="gen-format-btn" data-fmt="2"><div class="fmt-title">② 原因-過程-影響</div><div class="fmt-desc">政治/經濟/社會/外部原因分析</div></div>
<div class="gen-format-btn" data-fmt="3"><div class="fmt-title">③ DSE PEEL結構</div><div class="fmt-desc">P論點→E論據→E解釋→L扣題</div></div>
<div class="gen-format-btn" data-fmt="4"><div class="fmt-title">④ 混合型</div><div class="fmt-desc">事實+因果+PEEL 三合一</div></div>
</div>
<div class="btn-group" style="margin-top:12px;"><button class="btn btn-primary" onclick="generateNote()">🪄 生成筆記模板</button><button class="btn btn-success" onclick="saveGeneratedNote()">💾 儲存到筆記表</button></div>
</div>

</div>

儲存</button></div></div></div>
<div class="modal-overlay" id="prac-modal"><div class="modal"><div class="modal-header"><h2 id="prac-modal-title">新增操練記錄</h2><button class="modal-close" onclick="closeModal('prac-modal')">✕</button></div><input type="hidden" id="prac-edit-id"><input type="hidden" id="prac-edit-subject"><div id="prac-form-fields"></div><div style="text-align:right;margin-top:14px;"><button class="btn btn-success" onclick="savePrac()">💾 儲存</button></div></div></div>
</div>
<script>
const KEYS={notes:'dse_notes',prac:'dse_prac'};
function getData(k){try{return JSON.parse(localStorage.getItem(k))||{};}catch(e){return {};}}
function setData(k,v){localStorage.setItem(k,JSON.stringify(v));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
const quotes=["💪 每多溫一頁，就多一分把握。唔急，慢慢嚟！","🌟 今日嘅努力，係明日嘅底氣。堅持落去！","📚 DSE唔係短跑，係馬拉松。保持你嘅節奏！","🔥 熟練度1不可怕，最怕你唔願意由1開始。","✨ 每做錯一題，就離做對近一步。錯題係你嘅朋友！","🎯 專注當下，唔好諗仲有幾多未做。","🌱 溫習唔需要完美，需要嘅係開始。","⏰ 15分鐘都係時間，用咗就賺咗。","🧠 背唔到？試下用PEEL寫出嚟。","💡 唔識唔係問題，唔去搞清楚先係問題。","🚀 每日進步1%，一年後你就係365%嘅自己。","📖 打開書本嘅那一刻，你已經超越咗昨日。","🎨 筆記唔使靚，自己睇得明就夠。","🏔️ 山唔怕高，最怕腳停。","🌊 溫習如逆水行舟，唔進則退。","⭐ 你嘅努力唔會白費，DSE當日你就會感受到。","🎪 考試唔係考你識幾多，係考你溫咗幾多入腦。","🏠 補習老師教嘅，要自己再整理一次先係你嘅嘢。","🦋 改變唔係一朝一夕，但每日做少少，蝴蝶效應會出現。","🎲 做錯MC？記落操練表！覆檢嗰陣你會感激今日嘅自己。","🔑 熟練度1→2→3→4→5，每升一級你都強咗。","🌍 歷史係故事，唔係死記硬背。","✏️ 寫作唔夠分？每段用PEEL，結構即刻清晰。","🎯 數學最弱？每日做2題，積少成多。","🌈 低潮期人人都有，重點係唔好停。","💪 今天比昨天多溫了一課，已經在進步了！","🧩 每個課題都係拼圖嘅一塊。","🌟 信自己，你願意坐低溫書呢件事本身已經好叻。","📈 成績唔係一日升嘅，但每日做一定會升。","🎪 考DSE嗰日，你會感激現在坐低溫書嘅自己。"];
document.querySelectorAll('.nav-item').forEach(i=>{i.addEventListener('click',()=>{document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));i.classList.add('active');const p=i.dataset.page;document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));document.getElementById('page-'+p).classList.add('active');document.querySelector('.sidebar').classList.remove('open');if(p==='dashboard')renderDashboard();if(p.startsWith('notes-'))renderNotes(p.replace('notes-',''));if(p.startsWith('prac-'))renderPrac(p.replace('prac-',''));if(p==='dse-stats')renderStats('chhist');});});
const subjMap={chhist:'中史',whist:'世史',csd:'C&SD'};
const pracMap={eng:'英文',math:'數學',chi:'中文'};
let noteFilter={chhist:'all',whist:'all',csd:'all'};
function filterNotes(k,v){noteFilter[k]=v;renderNotes(k);}
const pracFields={'英文':[{id:'date',label:'日期',type:'date'},{id:'type',label:'類型',type:'select',opts:['Reading','Listening','Writing','Speaking','Integrated','Grammar','Vocab']},{id:'paper',label:'卷別',type:'select',opts:['Paper1','Paper2','Paper3','Paper4']},{id:'source',label:'來源',type:'select',opts:['DSE Past Paper','學校測驗','補習練習','其他']},{id:'dseYear',label:'DSE年份',type:'text'},{id:'qNum',label:'題號',type:'text'},{id:'score',label:'得分',type:'text'},{id:'errorType',label:'錯誤類型',type:'select',opts:['','Vocabulary','Grammar','Comprehension','Spelling','Time Management','Format','Content','Organization']},{id:'errorDetail',label:'錯誤詳情',type:'textarea'},{id:'improve',label:'改善行動',type:'text'},{id:'reviewed',label:'已覆檢',type:'select',opts:['否','是']}],'數學':[{id:'date',label:'日期',type:'date'},{id:'topic',label:'課題',type:'select',opts:['百分比','率與比','恆等式','一元一次不等式','三角學','面積與體積','坐標幾何','統計學','概率','其他']},{id:'paper',label:'卷別',type:'select',opts:['Paper1','Paper2']},{id:'source',label:'來源',type:'select',opts:['DSE Past Paper','學校測驗','補習練習','教科書','其他']},{id:'dseYear',label:'DSE年份',type:'text'},{id:'qNum',label:'題號',type:'text'},{id:'qType',label:'題型',type:'select',opts:['MC','短答','長題目','證明題']},{id:'correct',label:'做對',type:'select',opts:['是','否']},{id:'errorType',label:'錯誤類型',type:'select',opts:['','計算錯誤','概念不清','看錯題目','公式記錯','時間不足','步驟遺漏','其他']},{id:'errorDetail',label:'錯誤詳情',type:'textarea'},{id:'solution',label:'正確解法',type:'text'},{id:'reviewed',label:'已覆檢',type:'select',opts:['否','是']}],'中文':[{id:'date',label:'日期',type:'date'},{id:'type',label:'類型',type:'select',opts:['閱讀理解','寫作','文言文','語譯','實用文','綜合','說話','聆聽','其他']},{id:'paper',label:'卷別',type:'select',opts:['Paper1','Paper2','Paper3','Paper4']},{id:'source',label:'來源',type:'select',opts:['DSE Past Paper','學校測驗','補習練習','其他']},{id:'dseYear',label:'DSE年份',type:'text'},{id:'qNum',label:'題號',type:'text'},{id:'score',label:'得分',type:'text'},{id:'errorType',label:'錯誤類型',type:'select',opts:['','理解偏差','審題錯誤','表達不清','時間不足','格式錯誤','論點不足','論證薄弱','修辭誤判','其他']},{id:'errorDetail',label:'錯誤詳情',type:'textarea'},{id:'improve',label:'改善行動',type:'text'},{id:'reviewed',label:'已覆檢',type:'select',opts:['否','是']}]};
let selectedFmt='1',exportType='pdf';
document.querySelectorAll('.gen-format-btn').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('.gen-format-btn').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');selectedFmt=b.dataset.fmt;});});
function selectExport(el){document.querySelectorAll('.export-card').forEach(c=>c.classList.remove('selected'));el.classList.add('selected');exportType=el.dataset.exp;}
function renderDashboard(){document.getElementById('quote-text').textContent=quotes[Math.floor(Math.random()*quotes.length)];const n=getData(KEYS.notes),p=getData(KEYS.prac);const subs=[{key:'chhist',name:'中史',type:'筆記类',total:30},{key:'whist',name:'世史',type:'筆記类',total:25},{key:'csd',name:'C&SD',type:'筆記类',total:20},{key:'eng',name:'英文',type:'操練类',total:50},{key:'math',name:'數學',type:'操練类',total:40},{key:'chi',name:'中文',type:'操練类',total:45}];document.getElementById('progress-grid').innerHTML=subs.map(s=>{const items=(n[s.key]||[]),pItems=(p[s.key]||[]),done=items.length,pct=Math.round((done/s.total)*100),isW=s.type==='筆記类',dseC=items.filter(x=>x.dse==='是').length,lowC=items.filter(x=>x.prof&&parseInt(x.prof)<=2).length,errC=pItems.filter(x=>x.errorType).length;return`<div class="progress-card ${isW?'warm':'cool'}"><div style="display:flex;justify-content:space-between;align-items:center;"><div><div class="subject-name">${s.name}</div><div class="subject-type">${s.type} ${isW?'📖':'✏️'}</div></div><span class="tag ${isW?'tag-warm':'tag-cool'}">${pct}%</span></div><div class="progress-bar-bg"><div class="progress-bar ${isW?'warm':'cool'}" style="width:${pct}%"></div></div><div class="progress-stats"><span>完成 <span class="stat-val">${done}</span>/${s.total}</span>${isW?`<span>DSE <span class="stat-val">${dseC}</span></span><span>弱項 <span class="stat-val">${lowC}</span></span>`:`<span>錯題 <span class="stat-val">${errC}</span></span>`}</div></div>`;}).join('');}
function renderNotes(key){const notes=getData(KEYS.notes)[key]||[];const f=noteFilter[key]||'all';let filtered=notes;if(f==='dse')filtered=notes.filter(n=>n.dse==='是');if(f==='low')filtered=notes.filter(n=>n.prof&&parseInt(n.prof)<=2);const el=document.getElementById('note-list-'+key);if(!filtered.length){el.innerHTML='<div class="empty-state"><div class="icon">📖</div><div class="title">仲未有筆記</div><div class="desc">按 + 新增筆記 開始記錄</div></div>';return;}
el.innerHTML=filtered.map(n=>{const tags=(n.dseType||'').split('/').filter(Boolean).map(t=>{const c={'MC':'tag-mc','短答':'tag-short','DBQ':'tag-dbq','論述':'tag-essay'}[t]||'tag-warm';return`<span class="tag ${c}">${t}</span>`;}).join('');const prof=n.prof?parseInt(n.prof):0;const dots=[1,2,3,4,5].map(i=>`<span class="prof-dot ${i<=prof?(i<=2?'warn':'filled'):''}"></span>`).join('');return`<div class="note-item"><div style="display:flex;justify-content:space-between;align-items:start;"><div><div class="note-title">${n.topic}</div><div class="note-subtitle">${n.subtopic}</div></div><div class="btn-group"><button class="btn btn-sm btn-outline" onclick="editNote('${key}','${n.id}')">✏️</button><button class="btn btn-sm btn-danger" onclick="deleteNote('${key}','${n.id}')">🗑️</button></div></div>${n.content?`<div class="note-content">${n.content}</div>`:''}${n.keywords?`<div class="note-keywords">🔑 ${n.keywords}</div>`:''}<div class="note-meta">${n.dse==='是'?`<span class="tag" style="background:#FFEBEE;color:var(--danger);">📊 DSE已出現 ${n.dseYear||''}</span>`:''}${tags}<div class="prof" title="熟練度 ${prof}/5">${dots}</div></div>${n.testQ?`<div class="self-test"><div class="q">❓ ${n.testQ}</div><div class="a" id="ans-${n.id}">💡 ${n.testA||''}</div><button class="btn btn-sm btn-outline" style="margin-top:6px;" onclick="document.getElementById('ans-${n.id}').classList.toggle('show');this.textContent=this.textContent.includes('顯示')?'🙈 隱藏答案':'👁️ 顯示答案'">👁️ 顯示答案</button></div>`:''}</div>`;}).join('');}
function openNoteModal(subj,edit){document.getElementById('note-edit-subject').value=subj;document.getElementById('note-modal-title').textContent=edit?'編輯筆記':'新增筆記 — '+subj;document.getElementById('note-edit-id').value=edit?edit.id:'';if(edit){document.getElementById('nm-topic').value=edit.topic||'';document.getElementById('nm-subtopic').value=edit.subtopic||'';document.getElementById('nm-content').value=edit.content||'';document.getElementById('nm-keywords').value=edit.keywords||'';document.getElementById('nm-dse').value=edit.dse||'否';document.getElementById('nm-dse-type').value=edit.dseType||'';document.getElementById('nm-dse-year').value=edit.dseYear||'';document.getElementById('nm-testq').value=edit.testQ||'';document.getElementById('nm-testa').value=edit.testA||'';document.getElementById('nm-prof').value=edit.prof||'1';document.getElementById('nm-remarks').value=edit.remarks||'';}else{['nm-topic','nm-subtopic','nm-content','nm-keywords','nm-dse-type','nm-dse-year','nm-testq','nm-testa','nm-remarks'].forEach(id=>document.getElementById(id).value='');document.getElementById('nm-dse').value='否';document.getElementById('nm-prof').value='1';}document.getElementById('note-modal').classList.add('show');}
function saveNote(){const data=getData(KEYS.notes);const subj=document.getElementById('note-edit-subject').value;const sKey=subj==='中史'?'chhist':subj==='世史'?'whist':'csd';if(!data[sKey])data[sKey]=[];const note={id:document.getElementById('note-edit-id').value||uid(),topic:document.getElementById('nm-topic').value,subtopic:document.getElementById('nm-subtopic').value,content:document.getElementById('nm-content').value,keywords:document.getElementById('nm-keywords').value,dse:document.getElementById('nm-dse').value,dseType:document.getElementById('nm-dse-type').value,dseYear:document.getElementById('nm-dse-year').value,testQ:document.getElementById('nm-testq').value,testA:document.getElementById('nm-testa').value,prof:document.getElementById('nm-prof').value,remarks:document.getElementById('nm-remarks').value};const idx=data[sKey].findIndex(n=>n.id===note.id);if(idx>=0)data[sKey][idx]=note;else data[sKey].push(note);setData(KEYS.notes,data);closeModal('note-modal');renderNotes(sKey);}
function editNote(key,id){const notes=getData(KEYS.notes)[key]||[];const n=notes.find(x=>x.id===id);if(n)openNoteModal(subjMap[key],n);}
function deleteNote(key,id){if(!confirm('確定刪除？'))return;const data=getData(KEYS.notes);data[key]=data[key].filter(n=>n.id!==id);setData(KEYS.notes,data);renderNotes(key);}
function openPracModal(subj,edit){document.getElementById('prac-edit-subject').value=subj;document.getElementById('prac-modal-title').textContent=edit?'編輯記錄':'新增記錄 — '+subj;document.getElementById('prac-edit-id').value=edit?edit.id:'';const fields=pracFields[subj];document.getElementById('prac-form-fields').innerHTML=fields.map(f=>{const val=edit?edit[f.id]||'':'';if(f.type==='select')return`<div class="form-group"><label class="form-label">${f.label}</label><select class="form-select" id="pf-${f.id}">${f.opts.map(o=>`<option value="${o}" ${o===val?'selected':''}>${o||'—'}</option>`).join('')}</select></div>`;if(f.type==='textarea')return`<div class="form-group" style="grid-column:span 2"><label class="form-label">${f.label}</label><textarea class="form-textarea" id="pf-${f.id}" rows="2">${val}</textarea></div>`;return`<div class="form-group"><label class="form-label">${f.label}</label><input class="form-input" id="pf-${f.id}" type="${f.type==='date'?'date':'text'}" value="${val}"></div>`;}).join('');document.getElementById('prac-form-fields').style.display='grid';document.getElementById('prac-form-fields').style.gridTemplateColumns='1fr 1fr';document.getElementById('prac-form-fields').style.gap='10px';if(!edit){const df=fields.find(f=>f.id==='date');if(df){document.getElementById('pf-date').value=new Date().toISOString().slice(0,10);}}document.getElementById('prac-modal').classList.add('show');}
function savePrac(){const data=getData(KEYS.prac);const subj=document.getElementById('prac-edit-subject').value;const sKey=subj==='英文'?'eng':subj==='數學'?'math':'chi';if(!data[sKey])data[sKey]=[];const fields=pracFields[subj];const record={id:document.getElementById('prac-edit-id').value||uid()};fields.forEach(f=>{const el=document.getElementById('pf-'+f.id);record[f.id]=el?el.value:'';});const idx=data[sKey].findIndex(p=>p.id===record.id);if(idx>=0)data[sKey][idx]=record;else data[sKey].push(record);setData(KEYS.prac,data);closeModal('prac-modal');renderPrac(sKey);}
function renderPrac(key){const records=getData(KEYS.prac)[key]||[];const tbody=document.querySelector('#prac-table-'+key+' tbody');if(!records.length){tbody.innerHTML='<tr><td colspan="12" style="text-align:center;color:var(--gray-500);padding:30px;">仲未有記錄</td></tr>';return;}
tbody.innerHTML=records.map(r=>{const eb=`<button class="btn btn-sm btn-outline" onclick="editPrac('${key}','${r.id}')">✏️</button>`;const db=`<button class="btn btn-sm btn-danger" onclick="deletePrac('${key}','${r.id}')">🗑️</button>`;if(key==='math')return`<tr><td>${r.date||''}</td><td>${r.topic||''}</td><td>${r.paper||''}</td><td>${r.source||''}</td><td>${r.qNum||''}</td><td>${r.qType||''}</td><td>${r.correct==='是'?'✅':'❌'}</td><td>${r.errorType?`<span class="error-badge">${r.errorType}</span>`:''}</td><td>${r.errorDetail||''}</td><td>${r.solution||''}</td><td>${r.reviewed==='是'?'✅':'⬜'}</td><td>${eb}${db}</td></tr>`;return`<tr><td>${r.date||''}</td><td>${r.type||''}</td><td>${r.paper||''}</td><td>${r.source||''}</td><td>${r.qNum||''}</td><td>${r.score||''}</td><td>${r.errorType?`<span class="error-badge">${r.errorType}</span>`:''}</td><td>${r.errorDetail||''}</td><td>${r.improve?`<span class="improve-badge">${r.improve}</span>`:''}</td><td>${r.reviewed==='是'?'✅':'⬜'}</td><td>${eb}${db}</td></tr>`;}).join('');}
function editPrac(key,id){const records=getData(KEYS.prac)[key]||[];const r=records.find(x=>x.id===id);if(r)openPracModal(pracMap[key],r);}
function deletePrac(key,id){if(!confirm('確定刪除？'))return;const data=getData(KEYS.prac);data[key]=data[key].filter(p=>p.id!==id);setData(KEYS.prac,data);renderPrac(key);}
function renderStats(key){const notes=getData(KEYS.notes)[key]||[];const tbody=document.querySelector('#stats-table tbody');if(!notes.length){tbody.innerHTML='<tr><td colspan="6" style="text-align:center;color:var(--gray-500);">暫無數據</td></tr>';return;}
const tm={};notes.forEach(n=>{const t=n.topic||'?';if(!tm[t])tm[t]={mc:0,short:0,dbq:0,essay:0};const types=(n.dseType||'').split('/');if(types.includes('MC'))tm[t].mc++;if(types.includes('短答'))tm[t].short++;if(types.includes('DBQ'))tm[t].dbq++;if(types.includes('論述'))tm[t].essay++;});tbody.innerHTML=Object.entries(tm).map(([t,c])=>`<tr><td><strong>${t}</strong></td><td>${c.mc}</td><td>${c.short}</td><td>${c.dbq}</td><td>${c.essay}</td><td><strong>${c.mc+c.short+c.dbq+c.essay}</strong></td></tr>`).join('');}
function showStatTab(key,el){document.querySelectorAll('#page-dse-stats .tab-item').forEach(t=>t.classList.remove('active'));el.classList.add('active');renderStats(key);}
function generateNote(){const title=document.getElementById('gen-title').value||'未命名課題';const time=document.getElementById('gen-time').value||'';const people=document.getElementById('gen-people').value||'';const region=document.getElementById('gen-region').value||'';const subj=document.getElementById('gen-subject').value;let html=`<div style="background:var(--warm-bg);padding:10px 16px;border-radius:8px;margin-bottom:14px;"><strong>${subj}</strong> | ${title} | ${time} | ${people} | ${region}</div>`;if(selectedFmt==='1'){html+=`<h3 style="color:var(--success);margin-top:14px;">【背景描述】</h3><div class="form-group"><textarea class="form-textarea" id="gf-bg1" placeholder="事件發生前的狀況"></textarea></div><h3 style="color:var(--success);margin-top:14px;">【事實經過】</h3><div class="form-group"><label class="form-label">階段一：起因</label><textarea class="form-textarea" id="gf-s1" placeholder="事件是怎樣開始的？"></textarea></div><div class="form-group"><label class="form-label">階段二：發展</label><textarea class="form-textarea" id="gf-s2" placeholder="關鍵轉折點？"></textarea></div><div class="form-group"><label class="form-label">階段三：結果</label><textarea class="form-textarea" id="gf-s3" placeholder="事件最終如何結束？"></textarea></div><h3 style="color:var(--success);margin-top:14px;">【關鍵細節】</h3><div class="form-row"><div class="form-group"><label class="form-label">數據/數字</label><input class="form-input" id="gf-d1"></div><div class="form-group"><label class="form-label">重要條約/制度</label><input class="form-input" id="gf-d2"></div></div><h3 style="color:var(--success);margin-top:14px;">【即時影響】</h3><div class="form-group"><textarea class="form-textarea" id="gf-imp" placeholder="事件對當時的直接影響"></textarea></div>`;}else if(selectedFmt==='2'){html+=`<h3 style="color:var(--cool);margin-top:14px;">═══ 原因分析 ═══</h3><div class="form-group"><label class="form-label">政治原因</label><textarea class="form-textarea" id="gf-cp"></textarea></div><div class="form-group"><label class="form-label">經濟原因</label><textarea class="form-textarea" id="gf-ce"></textarea></div><div class="form-group"><label class="form-label">社會/文化原因</label><textarea class="form-textarea" id="gf-cs"></textarea></div><div class="form-group"><label class="form-label">外部/國際原因</label><textarea class="form-textarea" id="gf-co"></textarea></div><div class="form-group" style="background:#FFF8E1;padding:10px;border-radius:8px;"><label class="form-label">🔑 最關鍵原因</label><textarea class="form-textarea" id="gf-ck" placeholder="哪個最重要？DSE常問！"></textarea></div><h3 style="color:var(--cool);margin-top:14px;">═══ 過程 ═══</h3><div class="form-group"><label class="form-label">關鍵人物</label><textarea class="form-textarea" id="gf-pp"></textarea></div><div class="form-group"><label class="form-label">轉折點</label><textarea class="form-textarea" id="gf-tp"></textarea></div><h3 style="color:var(--cool);margin-top:14px;">═══ 影響 ═══</h3><div class="form-row"><div class="form-group"><label class="form-label">短期</label><textarea class="form-textarea" id="gf-is" rows="2"></textarea></div><div class="form-group"><label class="form-label">長期</label><textarea class="form-textarea" id="gf-il" rows="2"></textarea></div></div><div class="form-row"><div class="form-group"><label class="form-label">正面</label><textarea class="form-textarea" id="gf-ip" rows="2"></textarea></div><div class="form-group"><label class="form-label">負面</label><textarea class="form-textarea" id="gf-in" rows="2"></textarea></div></div><div class="form-group" style="background:#FFF8E1;padding:10px;border-radius:8px;"><label class="form-label">🔑 歷史意義</label><textarea class="form-textarea" id="gf-ev"></textarea></div>`;}else if(selectedFmt==='3'){html+=`<div style="background:var(--gray-50);padding:14px;border-radius:8px;margin-bottom:14px;font-size:12px;color:var(--gray-500);">PEEL = <span style="color:var(--peel-p);font-weight:700;">P論點</span> + <span style="color:var(--peel-e1);font-weight:700;">E論據</span> + <span style="color:var(--peel-e2);font-weight:700;">E解釋</span> + <span style="color:var(--peel-l);font-weight:700;">L扣題</span></div><div class="form-group"><label class="form-label">DSE常見問題</label><input class="form-input" id="gf-dseq" placeholder="這個課題DSE通常怎樣問？"></div>${[1,2].map(i=>`<h3 style="color:var(--primary);margin-top:16px;">═══ 論點${i} ═══</h3><div class="peel-section peel-p"><label style="color:var(--peel-p);">P — 論點</label><textarea class="form-textarea" id="gf-p${i}" rows="2"></textarea></div><div class="peel-section peel-e1"><label style="color:var(--peel-e1);">E — 論據</label><textarea class="form-textarea" id="gf-e1-${i}" rows="2"></textarea></div><div class="peel-section peel-e2"><label style="color:var(--peel-e2);">E — 解釋</label><textarea class="form-textarea" id="gf-e2-${i}" rows="2"></textarea></div><div class="peel-section peel-l"><label style="color:var(--peel-l);">L — 扣題</label><textarea class="form-textarea" id="gf-l${i}" rows="2"></textarea></div>`).join('')}<div class="form-group" style="background:#FFF8E1;padding:10px;border-radius:8px;margin-top:14px;"><label class="form-label">🔑 總結立場</label><textarea class="form-textarea" id="gf-conc"></textarea></div>`;}else{html+=`<h3 style="color:var(--warm-accent);margin-top:14px;">══ 第一部分：事實描述 ══</h3><div class="form-group"><label class="form-label">背景</label><textarea class="form-textarea" id="gf-mbg"></textarea></div><div class="form-group"><label class="form-label">經過</label><textarea class="form-textarea" id="gf-mpc"></textarea></div><h3 style="color:var(--cool);margin-top:14px;">══ 第二部分：原因-影響 ══</h3><div class="form-row-3"><div class="form-group"><label class="form-label">政治原因</label><textarea class="form-textarea" id="gf-mcp" rows="2"></textarea></div><div class="form-group"><label class="form-label">經濟原因</label><textarea class="form-textarea" id="gf-mce" rows="2"></textarea></div><div class="form-group"><label class="form-label">社會/外部</label><textarea class="form-textarea" id="gf-mcs" rows="2"></textarea></div></div><div class="form-row"><div class="form-group"><label class="form-label">短期影響</label><textarea class="form-textarea" id="gf-mis" rows="2"></textarea></div><div class="form-group"><label class="form-label">長期影響</label><textarea class="form-textarea" id="gf-mil" rows="2"></textarea></div></div><h3 style="color:var(--peel-l);margin-top:14px;">══ 第三部分：PEEL ══</h3><div class="form-group"><label class="form-label">DSE常見問題</label><input class="form-input" id="gf-mdseq"></div>${[1,2].map(i=>`<div class="peel-section peel-p"><label style="color:var(--peel-p);">P${i}</label><textarea class="form-textarea" id="gf-mp${i}" rows="1"></textarea></div><div class="peel-section peel-e1"><label style="color:var(--peel-e1);">E論據${i}</label><textarea class="form-textarea" id="gf-me1-${i}" rows="1"></textarea></div><div class="peel-section peel-e2"><label style="color:var(--peel-e2);">E解釋${i}</label><textarea class="form-textarea" id="gf-me2-${i}" rows="1"></textarea></div><div class="peel-section peel-l"><label style="color:var(--peel-l);">L${i}</label><textarea class="form-textarea" id="gf-ml${i}" rows="1"></textarea></div>`).join('')}<div class="form-group" style="background:#FFF8E1;padding:10px;border-radius:8px;margin-top:14px;"><label class="form-label">🔑 總結</label><textarea class="form-textarea" id="gf-mconc"></textarea></div>`;}
document.getElementById('gen-result-content').innerHTML=html;document.getElementById('gen-output').style.display='block';}
function saveGeneratedNote(){const subj=document.getElementById('gen-subject').value;const title=document.getElementById('gen-title').value||'未命名';const sKey=subj==='中史'?'chhist':subj==='世史'?'whist':'csd';const parts=[];document.querySelectorAll('#gen-result-content textarea, #gen-result-content input[type=text]').forEach(el=>{if(el.value.trim()){const lbl=el.parentElement.querySelector('label');parts.push(lbl?`【${lbl.textContent.replace(/[：:]$/,'').trim()}】${el.value.trim()}`:el.value.trim());}});const data=getData(KEYS.notes);if(!data[sKey])data[sKey]=[];data[sKey].push({id:uid(),topic:title,subtopic:document.getElementById('gen-time').value||'',content:parts.join('\n'),keywords:document.getElementById('gen-people').value||'',dse:'否',dseType:'',dseYear:'',testQ:'',testA:'',prof:'1',remarks:'由筆記生成器建立'});setData(KEYS.notes,data);alert('✅ 已儲存到'+subj+'筆記！');}
function copyGenOutput(){navigator.clipboard.writeText(document.getElementById('gen-result-content').innerText).then(()=>alert('已複製！'));}
function doExport(){const subj=document.getElementById('exp-subject').value;const filter=document.getElementById('exp-filter').value;const notes=getData(KEYS.notes);const prac=getData(KEYS.prac);const sKeys=subj==='全部'?['chhist','whist','csd']:[subj==='中史'?'chhist':subj==='世史'?'whist':'csd'];let html=`<html><head><meta charset="UTF-8"><title>DSE筆記匯出</title><style>body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;padding:30px;color:#333;max-width:800px;margin:0 auto}h1{color:#1B3A5C;text-align:center;border-bottom:3px solid #1B3A5C;padding-bottom:10px}h2{color:#8B4513;margin-top:24px}.note{border-left:4px solid #8B4513;padding:10px 16px;margin:10px 0;background:#FFF8E1;border-radius:0 8px 8px 0}.note .title{font-weight:700;font-size:15px;color:#1B3A5C}.note .content{margin-top:6px;white-space:pre-wrap;font-size:13px;line-height:1.7}.dse-tag{display:inline-block;background:#FFEBEE;color:#C0392B;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;margin:2px}table{width:100%;border-collapse:collapse;font-size:12px;margin-top:10px}th{background:#1B3A5C;color:#fff;padding:8px;text-align:left}td{padding:8px;border-bottom:1px solid #ddd}.meta{font-size:11px;color:#999;margin-top:10px;text-align:center}</style></head><body><h1>DSE 筆記匯出</h1><div class="meta">日期：${new Date().toLocaleString('zh-HK')} | 科目：${subj}</div>`;sKeys.forEach(key=>{let items=notes[key]||[];if(filter==='dse')items=items.filter(n=>n.dse==='是');if(filter==='low')items=items.filter(n=>n.prof&&parseInt(n.prof)<=2);if(!items.length)return;html+=`<h2>📖 ${subjMap[key]} 筆記</h2>`;items.forEach(n=>{html+=`<div class="note"><div class="title">${n.topic} — ${n.subtopic}</div>`;if(n.content)html+=`<div class="content">${n.content}</div>`;if(n.keywords)html+=`<div style="margin-top:4px;font-size:12px;color:#8B4513;">🔑 ${n.keywords}</div>`;if(n.dse==='是'){html+=`<div style="margin-top:4px;"><span class="dse-tag">📊 DSE已出現 ${n.dseYear||''}</span>`;(n.dseType||'').split('/').filter(Boolean).forEach(t=>html+=`<span class="dse-tag">${t}</span>`);html+=`</div>`;}if(n.testQ)html+=`<div style="background:#F5F5F5;padding:8px 12px;border-radius:6px;margin-top:8px;font-size:13px;">❓ ${n.testQ}<br>💡 ${n.testA||''}</div>`;html+=`</div>`;});});html+=`</body></html>`;if(exportType==='print'){const w=window.open('','_blank');w.document.write(html);w.document.close();setTimeout(()=>w.print(),500);}else{const blob=new Blob([html],{type:'text/html'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`DSE筆記_${subj}_${new Date().toISOString().slice(0,10)}.html`;a.click();URL.revokeObjectURL(url);alert('✅ 已下載！用瀏覽器開啟後按 Ctrl+P 可列印為PDF');}}

const p=getData(KEYS.prac);if(!Object.keys(p).length){p.eng=[{id:uid(),date:'2026-05-20',type:'Reading',paper:'Paper1',source:'DSE Past Paper',dseYear:'2023',qNum:'1A',score:'5/8',errorType:'Comprehension',errorDetail:'推斷題未能從文中找線索',improve:'練習找key words再推斷',reviewed:'否'}];p.math=[{id:uid(),date:'2026-05-18',topic:'百分比',paper:'Paper2',source:'DSE Past Paper',dseYear:'2023',qNum:'Q5',qType:'MC',correct:'否',errorType:'概念不清',errorDetail:'混淆折舊與增值',solution:'折舊用乘法遞減，增值用(1+r%)^n',reviewed:'否'}];p.chi=[{id:uid(),date:'2026-05-19',type:'閱讀理解',paper:'Paper1',source:'DSE Past Paper',dseYear:'2023',qNum:'1.4',score:'3/6',errorType:'理解偏差',errorDetail:'未能概括作者情感轉變',improve:'注意轉折詞標記情感變化',reviewed:'否'}];setData(KEYS.prac,p);}}
