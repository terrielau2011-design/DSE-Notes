function updateGenForm(){
  const subject=document.getElementById('gen-subject').value;
  const dynastyGroup=document.getElementById('dynasty-group');
  const titleSelect=document.getElementById('gen-title-select');
  const titleInput=document.getElementById('gen-title');
  const hints=document.getElementById('gen-hints');
  // Reset
  titleInput.value='';
  titleSelect.innerHTML='';
  hints.innerHTML='';

  if(subject==='中史'){
    dynastyGroup.style.display='block';
    document.querySelector('#dynasty-group label').textContent='朝代';
    const sel=document.getElementById('gen-dynasty');
    sel.innerHTML='<option value="">-- 選擇朝代 --</option>';
    dynastyOrder.forEach(d=>{
      const count=(knowledgeBase['中史']||[]).filter(t=>t.dynasty===d).length;
      const opt=document.createElement('option');
      opt.value=d;
      opt.textContent=d+(count?' ('+count+'個課題)':'');
      sel.appendChild(opt);
    });
    // Also add "全部" option
    const allOpt=document.createElement('option');
    allOpt.value='全部';
    allOpt.textContent='📋 全部課題';
    sel.appendChild(allOpt);
    // Show select dropdown, hide text input initially
    titleSelect.style.display='block';
    titleInput.style.display='none';
    // Populate with all topics
    populateTopicSelect('中史','');
  } else if(subject==='世史'){
    dynastyGroup.style.display='block';
    document.querySelector('#dynasty-group label').textContent='時期';
    const sel=document.getElementById('gen-dynasty');
    sel.innerHTML='<option value="">-- 選擇時期 --</option>';
    periodOrder.forEach(p=>{
      const count=(knowledgeBase['世史']||[]).filter(t=>(whistPeriodMap[t.title]||'')===p).length;
      const opt=document.createElement('option');
      opt.value=p;
      opt.textContent=p+(count?' ('+count+'個課題)':'');
      sel.appendChild(opt);
    });
    const allOpt=document.createElement('option');
    allOpt.value='全部';
    allOpt.textContent='📋 全部課題';
    sel.appendChild(allOpt);
    titleSelect.style.display='block';
    titleInput.style.display='none';
    populateTopicSelect('世史','');
  } else {
    // C&SD
    dynastyGroup.style.display='block';
    document.querySelector('#dynasty-group label').textContent='議題分類';
    const sel=document.getElementById('gen-dynasty');
    sel.innerHTML='<option value="">-- 選擇分類 --</option>';
    csdCatOrder.forEach(c=>{
      const count=(knowledgeBase['C&SD']||[]).filter(t=>(csdCatMap[t.title]||'')===c).length;
      const opt=document.createElement('option');
      opt.value=c;
      opt.textContent=c+(count?' ('+count+'個課題)':'');
      sel.appendChild(opt);
    });
    const allOpt=document.createElement('option');
    allOpt.value='全部';
    allOpt.textContent='📋 全部課題';
    sel.appendChild(allOpt);
    titleSelect.style.display='block';
    titleInput.style.display='none';
    populateTopicSelect('C&SD','');
  }
}

function populateTopicSelect(subject, filter){
  const sel=document.getElementById('gen-title-select');
  const kb=knowledgeBase[subject]||[];
  sel.innerHTML='<option value="">-- 選擇課題 --</option>';
  let topics=kb;
  if(filter && filter!=='全部'){
    if(subject==='中史'){
      topics=kb.filter(t=>t.dynasty===filter);
    } else if(subject==='世史'){
      topics=kb.filter(t=>(whistPeriodMap[t.title]||'')===filter);
    } else if(subject==='C&SD'){
      topics=kb.filter(t=>(csdCatMap[t.title]||'')===filter);
    }
  }
  topics.forEach(t=>{
    const opt=document.createElement('option');
    opt.value=t.title;
    opt.textContent=t.title+(t.dseRecord?' 📋':'');
    sel.appendChild(opt);
  });
  // Add custom option
  const customOpt=document.createElement('option');
  customOpt.value='__custom__';
  customOpt.textContent='✏️ 自訂課題...';
  sel.appendChild(customOpt);
}

function onDynastyChange(){
  const subject=document.getElementById('gen-subject').value;
  const dynasty=document.getElementById('gen-dynasty').value;
  const titleSelect=document.getElementById('gen-title-select');
  const titleInput=document.getElementById('gen-title');
  // Show select, hide input
  titleSelect.style.display='block';
  titleInput.style.display='none';
  titleInput.value='';
  populateTopicSelect(subject, dynasty);
  // Show DSE exam info hint
  const hints=document.getElementById('gen-hints');
  if(dynasty && dynasty!=='全部'){
    const kb=knowledgeBase[subject]||[];
    let filtered;
    if(subject==='中史') filtered=kb.filter(t=>t.dynasty===dynasty);
    else if(subject==='世史') filtered=kb.filter(t=>(whistPeriodMap[t.title]||'')===dynasty);
    else filtered=kb.filter(t=>(csdCatMap[t.title]||'')===dynasty);
    const dseTopics=filtered.filter(t=>t.dseRecord);
    if(dseTopics.length>0){
      hints.innerHTML='🔥 <strong>'+dynasty+'</strong>有 <strong>'+dseTopics.length+'</strong> 個課題曾在DSE出題：'+dseTopics.map(t=>t.title).join('、');
    } else {
      hints.innerHTML='📖 <strong>'+dynasty+'</strong>暫無DSE出題記錄的課題，但仍可生成筆記溫習';
    }
  } else {
    hints.innerHTML='';
  }
}

function onTopicSelect(){
  const titleSelect=document.getElementById('gen-title-select');
  const titleInput=document.getElementById('gen-title');
  if(titleSelect.value==='__custom__'){
    // Switch to text input mode
    titleSelect.style.display='none';
    titleInput.style.display='block';
    titleInput.focus();
    titleInput.placeholder='輸入自訂課題名稱...';
    return;
  }
  titleInput.value=titleSelect.value;
  // Auto-fill other fields from knowledge base
  const subject=document.getElementById('gen-subject').value;
  const kb=knowledgeBase[subject]||[];
  const match=kb.find(t=>t.title===titleSelect.value);
  if(match){
    document.getElementById('gen-time').value=match.time||'';
    document.getElementById('gen-people').value=match.people||'';
    document.getElementById('gen-region').value=match.region||'';
    const hints=document.getElementById('gen-hints');
    if(match.dseRecord){
      hints.innerHTML='📋 <strong>DSE出題記錄：</strong>'+match.dseRecord+' — 選擇「DSE PEEL結構」或「混合型」可獲取考評局Marking Scheme內容！';
    } else {
      hints.innerHTML='✅ 已從課題庫自動填入內容';
    }
  }
}

function showTopicHints(){
  const subject=document.getElementById('gen-subject').value;
  const title=document.getElementById('gen-title').value;
  const hints=document.getElementById('gen-hints');
  if(!title||title.length<1){hints.innerHTML='';return;}
  const kb=knowledgeBase[subject]||[];
  const matches=kb.filter(t=>t.title.includes(title)||title.includes(t.title));
  if(matches.length>0){
    hints.innerHTML='💡 找到匹配課題：'+matches.map(m=>'<span style="cursor:pointer;color:var(--primary);text-decoration:underline;" onclick="selectTopicFromHint(\''+m.title+'\')">'+m.title+'</span>').join('、');
  } else {
    hints.innerHTML='⚠️ 未找到匹配課題，將生成自訂筆記';
  }
}

function selectTopicFromHint(title){
  const titleInput=document.getElementById('gen-title');
  const titleSelect=document.getElementById('gen-title-select');
  titleInput.value=title;
  titleSelect.value=title;
  // Trigger auto-fill
  const subject=document.getElementById('gen-subject').value;
  const kb=knowledgeBase[subject]||[];
  const match=kb.find(t=>t.title===title);
  if(match){
    document.getElementById('gen-time').value=match.time||'';
    document.getElementById('gen-people').value=match.people||'';
    document.getElementById('gen-region').value=match.region||'';
    const hints=document.getElementById('gen-hints');
    if(match.dseRecord){
      hints.innerHTML='📋 <strong>DSE出題記錄：</strong>'+match.dseRecord+' — 選擇「DSE PEEL結構」或「混合型」可獲取考評局Marking Scheme內容！';
    } else {
      hints.innerHTML='✅ 已從課題庫自動填入內容';
    }
  }
}

function renderDashboard(){
  document.getElementById('quote-text').textContent=quotes[Math.floor(Math.random()*quotes.length)];
  const notes=getData(KEYS.notes);
  const prac=getData(KEYS.prac);
  const subjects=[
    {key:'chhist',name:'中史',type:'筆記类',total:30},
    {key:'whist',name:'世史',type:'筆記类',total:25},
    {key:'csd',name:'C&SD',type:'筆記类',total:20},
    {key:'eng',name:'英文',type:'操練类',total:50},
    {key:'math',name:'數學',type:'操練类',total:40},
    {key:'chi',name:'中文',type:'操練类',total:45},
  ];
  const grid=document.getElementById('progress-grid');
  grid.innerHTML=subjects.map(s=>{
    const items=notes[s.key]||[];
    const pItems=prac[s.key]||[];
    const done=items.length;
    const pct=Math.round((done/s.total)*100);
    const isWarm=s.type==='筆記类';
    const dseCount=items.filter(n=>n.dse==='是').length;
    const lowCount=items.filter(n=>n.prof&&parseInt(n.prof)<=2).length;
    const errCount=pItems.filter(p=>p.errorType).length;
    return `<div class="progress-card ${isWarm?'warm':'cool'}">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div><div class="subject-name">${s.name}</div><div class="subject-type">${s.type} ${isWarm?'📖':'✏️'}</div></div>
        <span class="tag ${isWarm?'tag-warm':'tag-cool'}">${pct}%</span>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar ${isWarm?'warm':'cool'}" style="width:${pct}%"></div></div>
      <div class="progress-stats">
        <span>完成 <span class="stat-val">${done}</span>/${s.total}</span>
        ${isWarm?`<span>DSE題 <span class="stat-val">${dseCount}</span></span><span>弱項 <span class="stat-val">${lowCount}</span></span>`:`<span>錯題 <span class="stat-val">${errCount}</span></span>`}
      </div>
    </div>`;
  }).join('');
}

let noteFilter={chhist:'all',whist:'all',csd:'all'};
function filterNotes(key,val){ noteFilter[key]=val; renderNotes(key); }

function renderNotes(key){
  const notes=getData(KEYS.notes)[key]||[];
  const f=noteFilter[key]||'all';
  let filtered=notes;
  if(f==='dse') filtered=notes.filter(n=>n.dse==='是');
  if(f==='low') filtered=notes.filter(n=>n.prof&&parseInt(n.prof)<=2);
  const el=document.getElementById('note-list-'+key);
  if(!filtered.length){ el.innerHTML='<div class="empty-state"><div class="icon">📖</div><div class="title">仲未有筆記</div><div class="desc">按「+ 新增筆記」開始記錄</div></div>'; return; }
  el.innerHTML=filtered.map(n=>{
    const tags=(n.dseType||'').split('/').filter(Boolean).map(t=>{
      const cls={'MC':'tag-mc','短答':'tag-short','DBQ':'tag-dbq','論述':'tag-essay'}[t]||'tag-warm';
      return `<span class="tag ${cls}">${t}</span>`;
    }).join('');
    const prof=n.prof?parseInt(n.prof):0;
    const dots=[1,2,3,4,5].map(i=>`<span class="prof-dot ${i<=prof?(i<=2?'warn':'filled'):''}"></span>`).join('');
    return `<div class="note-item">
      <div style="display:flex;justify-content:space-between;align-items:start;">
        <div><div class="note-title">${n.topic}</div><div class="note-subtitle">${n.subtopic}</div></div>
        <div class="btn-group"><button class="btn btn-sm btn-outline" onclick="editNote('${key}','${n.id}')">✏️</button><button class="btn btn-sm btn-danger" onclick="deleteNote('${key}','${n.id}')">🗑️</button></div>
      </div>
      ${n.content?`<div class="note-content">${n.content}</div>`:''}
      ${n.keywords?`<div class="note-keywords">🔑 ${n.keywords}</div>`:''}
      <div class="note-meta">
        ${n.dse==='是'?`<span class="tag" style="background:#FFEBEE;color:var(--danger);">📊 DSE已出現 ${n.dseYear||''}</span>`:''}
        ${tags}
        <div class="prof" title="熟練度 ${prof}/5">${dots}</div>
      </div>
      ${n.testQ?`<div class="self-test"><div class="q">❓ ${n.testQ}</div><div class="a" id="ans-${n.id}">💡 ${n.testA||''}</div><button class="btn btn-sm btn-outline" style="margin-top:6px;" onclick="document.getElementById('ans-${n.id}').classList.toggle('show');this.textContent=this.textContent==='👁️ 顯示答案'?'🙈 隱藏答案':'👁️ 顯示答案'">👁️ 顯示答案</button></div>`:''}
      ${n.remarks?`<div style="margin-top:8px;font-size:12px;color:var(--gray-500);">📌 ${n.remarks}</div>`:''}
    </div>`;
  }).join('');
}

function saveNote(){
  const data=getData(KEYS.notes);
  const subject=document.getElementById('note-edit-subject').value;
  const sKey=subject==='中史'?'chhist':subject==='世史'?'whist':'csd';
  if(!data[sKey]) data[sKey]=[];
  const note={
    id:document.getElementById('note-edit-id').value||uid(),
    topic:document.getElementById('nm-topic').value,
    subtopic:document.getElementById('nm-subtopic').value,
    content:document.getElementById('nm-content').value,
    keywords:document.getElementById('nm-keywords').value,
    dse:document.getElementById('nm-dse').value,
    dseType:document.getElementById('nm-dse-type').value,
    dseYear:document.getElementById('nm-dse-year').value,
    testQ:document.getElementById('nm-testq').value,
    testA:document.getElementById('nm-testa').value,
    prof:document.getElementById('nm-prof').value,
    remarks:document.getElementById('nm-remarks').value,
  };
  const idx=data[sKey].findIndex(n=>n.id===note.id);
  if(idx>=0) data[sKey][idx]=note; else data[sKey].push(note);
  setData(KEYS.notes,data);
  closeModal('note-modal');
  renderNotes(sKey);
}

function editNote(key,id){
  const notes=getData(KEYS.notes)[key]||[];
  const n=notes.find(x=>x.id===id);
  if(n) openNoteModal(subjMap[key],n);
}

function deleteNote(key,id){
  if(!confirm('確定刪除呢條筆記？')) return;
  const data=getData(KEYS.notes);
  data[key]=data[key].filter(n=>n.id!==id);
  setData(KEYS.notes,data);
  renderNotes(key);
}

function renderStats(key){
  const notes=getData(KEYS.notes)[key]||[];
  const tbody=document.querySelector('#stats-table tbody');
  if(!notes.length){ tbody.innerHTML='<tr><td colspan="6" style="text-align:center;color:var(--gray-500);">暫無數據</td></tr>'; return; }
  // Aggregate by topic
  const topicMap={};
  notes.forEach(n=>{
    const t=n.topic||'未分類';
    if(!topicMap[t]) topicMap[t]={mc:0,short:0,dbq:0,essay:0};
    const types=(n.dseType||'').split('/');
    if(types.includes('MC')) topicMap[t].mc++;
    if(types.includes('短答')) topicMap[t].short++;
    if(types.includes('DBQ')) topicMap[t].dbq++;
    if(types.includes('論述')) topicMap[t].essay++;
  });
  tbody.innerHTML=Object.entries(topicMap).map(([topic,counts])=>{
    const total=counts.mc+counts.short+counts.dbq+counts.essay;
    return `<tr><td><strong>${topic}</strong></td><td>${counts.mc}</td><td>${counts.short}</td><td>${counts.dbq}</td><td>${counts.essay}</td><td><strong>${total}</strong></td></tr>`;
  }).join('');
}

}

function genFillQuestions(topics,count,lang){
  const qs=[];
  const used=new Set();
  const shuffled=[...topics].sort(()=>Math.random()-0.5);
  const isEn=lang==='en';
  const templates=isEn?[
    {field:'people',label:'Who are the key figures related to __TOPIC__?',hint:'Answer format: Names'},
    {field:'time',label:'When did __TOPIC__ take place?',hint:'Answer format: Year/Period'},
    {field:'region',label:'Where did __TOPIC__ take place?',hint:'Answer format: Region name'},
    {field:'keyCause',label:'What is the key cause of __TOPIC__?',hint:'Summarise in one sentence'},
    {field:'factDetail',label:'What are the key data/details of __TOPIC__?',hint:'List key facts and figures'},
    {field:'shortImpact',label:'What is the short-term impact of __TOPIC__?',hint:'Briefly describe'},
    {field:'posImpact',label:'What are the positive impacts of __TOPIC__?',hint:'List positive impacts'},
    {field:'negImpact',label:'What are the negative impacts of __TOPIC__?',hint:'List negative impacts'},
    {field:'evaluation',label:'How is __TOPIC__ evaluated historically?',hint:'Briefly describe the evaluation'},
  ]:[
    {field:'people',label:'__課題__的相關人物是誰？',hint:'答案格式：人名'},
    {field:'time',label:'__課題__發生在什麼時候？',hint:'答案格式：年份/時期'},
    {field:'region',label:'__課題__發生在哪個地區？',hint:'答案格式：地區名稱'},
    {field:'keyCause',label:'__課題__的最關鍵原因是什麼？',hint:'用一句話概括'},
    {field:'factDetail',label:'__課題__中有哪些重要數據/細節？',hint:'列舉關鍵數據'},
    {field:'shortImpact',label:'__課題__的短期影響是什麼？',hint:'簡述短期影響'},
    {field:'posImpact',label:'__課題__有哪些正面影響？',hint:'列舉正面影響'},
    {field:'negImpact',label:'__課題__有哪些負面影響？',hint:'列舉負面影響'},
    {field:'evaluation',label:'歷史對__課題__的評價如何？',hint:'簡述歷史評價'},
  ];
  const placeholder=isEn?'__TOPIC__':'__課題__';
  const wrapper=isEn?t=>t:'「'+t+'」';
  // Generate all possible (topic, template) combos, shuffle, pick without repeat
  const combos=[];
  shuffled.forEach(t=>{
    templates.forEach(tpl=>{
      const val=t[tpl.field];
      if(val&&val.trim()!==''){
        const key=t.title+'|'+tpl.field;
        if(!used.has(key)){
          combos.push({topic:t,tpl,val,key});
        }
      }
    });
  });
  combos.sort(()=>Math.random()-0.5);
  for(let i=0;i<combos.length&&qs.length<count;i++){
    const c=combos[i];
    if(used.has(c.key)) continue;
    used.add(c.key);
    const opts=[c.val];
    const sameField=topics.filter(t2=>t2.title!==c.topic.title&&t2[c.tpl.field]&&t2[c.tpl.field].trim()!=='').map(t2=>t2[c.tpl.field]);
    const uniqueDistractors=[...new Set(sameField)].filter(d=>d!==c.val);
    const distractors=uniqueDistractors.sort(()=>Math.random()-0.5).slice(0,3);
    distractors.forEach(d=>{if(opts.length<4&&d!==c.val&&!opts.includes(d)) opts.push(d);});
    if(opts.length<3){
      const otherFields=['people','time','dynasty','region'].filter(f=>f!==c.tpl.field);
      otherFields.forEach(f=>{
        topics.filter(t2=>t2.title!==c.topic.title&&t2[f]&&t2[f].trim()!=='').forEach(t2=>{
          if(opts.length<4&&!opts.includes(t2[f])) opts.push((isEn?'['+t2.title+'] ':'【'+t2.title+'】')+t2[f]);
        });
      });
    }
    const uniqueOpts=[...new Set(opts)];
    if(uniqueOpts.length<2) continue;
    const shuffledOpts=[...uniqueOpts].sort(()=>Math.random()-0.5);
    qs.push({type:'fill',topic:c.topic.title,question:c.tpl.label.replace(placeholder,wrapper(c.topic.title)),answer:c.val,hint:c.tpl.hint,options:shuffledOpts});
  }
  return qs;
}

function genMatchQuestions(topics,count,lang){
  const qs=[];
  const shuffled=[...topics].sort(()=>Math.random()-0.5);
  const isEn=lang==='en';
  const pairFields=isEn?[
    {keyField:'title',valField:'keyCause',label:'Match each topic with its key cause'},
    {keyField:'title',valField:'shortImpact',label:'Match each topic with its short-term impact'},
    {keyField:'title',valField:'factDetail',label:'Match each topic with its key details'},
    {keyField:'title',valField:'evaluation',label:'Match each topic with its historical evaluation'},
  ]:[
    {keyField:'title',valField:'keyCause',label:'將課題與其最關鍵原因配對'},
    {keyField:'title',valField:'shortImpact',label:'將課題與其短期影響配對'},
    {keyField:'title',valField:'factDetail',label:'將課題與其重要細節配對'},
    {keyField:'title',valField:'evaluation',label:'將課題與其歷史評價配對'},
  ];
  const qCount=Math.ceil(count/4);
  for(let i=0;i<qCount&&i*4<shuffled.length;i++){
    const field=pairFields[i%pairFields.length];
    const group=shuffled.slice(i*4,(i+1)*4+1).slice(0,4);
    if(group.length<2) continue;
    const pairs=group.map(t=>({key:t[field.keyField],val:t[field.valField]||''})).filter(p=>p.val);
    if(pairs.length<2) continue;
    qs.push({type:'match',label:field.label,pairs:pairs});
  }
  return qs;
}

}

function genPEELQuestions(topics,count,lang){
  const qs=[];
  const used=new Set();
  const eligible=topics.filter(t=>t.dseQ&&t.dseQ.trim());
  if(eligible.length===0) return qs;
  const shuffled=[...eligible].sort(()=>Math.random()-0.5);
  const isEn=lang==='en';
  for(let i=0;i<shuffled.length&&qs.length<count;i++){
    const t=shuffled[i];
    const key=t.title+'|peel';
    if(used.has(key)) continue;
    used.add(key);
    const questions=(t.dseQ||'').split('|||').map(q=>q.trim()).filter(Boolean);
    const qText=questions[Math.floor(Math.random()*questions.length)]||questions[0];
    let peelHints='';
    if(isEn){
      if(t.p1) peelHints+=`<div style="margin:4px 0;"><span style="color:var(--peel-p);font-weight:700;">P (Point 1):</span> ${t.p1}</div>`;
      if(t.e1_1) peelHints+=`<div style="margin:4px 0;padding-left:12px;"><span style="color:var(--peel-e1);font-weight:700;">E (Evidence 1):</span> ${t.e1_1}</div>`;
      if(t.e2_1) peelHints+=`<div style="margin:4px 0;padding-left:12px;"><span style="color:var(--peel-e2);font-weight:700;">E (Explanation 1):</span> ${t.e2_1}</div>`;
      if(t.l1) peelHints+=`<div style="margin:4px 0;padding-left:12px;"><span style="color:var(--peel-l);font-weight:700;">L (Link 1):</span> ${t.l1}</div>`;
      if(t.p2) peelHints+=`<div style="margin:6px 0 4px;"><span style="color:var(--peel-p);font-weight:700;">P (Point 2):</span> ${t.p2}</div>`;
      if(t.e1_2) peelHints+=`<div style="margin:4px 0;padding-left:12px;"><span style="color:var(--peel-e1);font-weight:700;">E (Evidence 2):</span> ${t.e1_2}</div>`;
      if(t.e2_2) peelHints+=`<div style="margin:4px 0;padding-left:12px;"><span style="color:var(--peel-e2);font-weight:700;">E (Explanation 2):</span> ${t.e2_2}</div>`;
      if(t.l2) peelHints+=`<div style="margin:4px 0;padding-left:12px;"><span style="color:var(--peel-l);font-weight:700;">L (Link 2):</span> ${t.l2}</div>`;
      if(t.conclusion) peelHints+=`<div style="margin:6px 0 4px;"><span style="color:var(--success);font-weight:700;">🔑 Conclusion:</span> ${t.conclusion}</div>`;
    } else {
      if(t.p1) peelHints+=`<div style="margin:4px 0;"><span style="color:var(--peel-p);font-weight:700;">P（論點1）：</span>${t.p1}</div>`;
      if(t.e1_1) peelHints+=`<div style="margin:4px 0;padding-left:12px;"><span style="color:var(--peel-e1);font-weight:700;">E（論據1）：</span>${t.e1_1}</div>`;
      if(t.e2_1) peelHints+=`<div style="margin:4px 0;padding-left:12px;"><span style="color:var(--peel-e2);font-weight:700;">E（解釋1）：</span>${t.e2_1}</div>`;
      if(t.l1) peelHints+=`<div style="margin:4px 0;padding-left:12px;"><span style="color:var(--peel-l);font-weight:700;">L（扣題1）：</span>${t.l1}</div>`;
      if(t.p2) peelHints+=`<div style="margin:6px 0 4px;"><span style="color:var(--peel-p);font-weight:700;">P（論點2）：</span>${t.p2}</div>`;
      if(t.e1_2) peelHints+=`<div style="margin:4px 0;padding-left:12px;"><span style="color:var(--peel-e1);font-weight:700;">E（論據2）：</span>${t.e1_2}</div>`;
      if(t.e2_2) peelHints+=`<div style="margin:4px 0;padding-left:12px;"><span style="color:var(--peel-e2);font-weight:700;">E（解釋2）：</span>${t.e2_2}</div>`;
      if(t.l2) peelHints+=`<div style="margin:4px 0;padding-left:12px;"><span style="color:var(--peel-l);font-weight:700;">L（扣題2）：</span>${t.l2}</div>`;
      if(t.conclusion) peelHints+=`<div style="margin:6px 0 4px;"><span style="color:var(--success);font-weight:700;">🔑 總結立場：</span>${t.conclusion}</div>`;
    }
    qs.push({type:'peel',topic:t.title,question:qText,answer:t.conclusion||'',peelHints:peelHints,dseRecord:t.dseRecord||'',commonMistakes:t.commonMistakes||'',answerTips:t.answerTips||''});
  }
  return qs;
}

function startQuiz(){
  const subject=document.getElementById('quiz-subject').value;
  const filter=document.getElementById('quiz-filter').value;
  const count=parseInt(document.getElementById('quiz-count').value);
  const topics=getFilteredTopics(subject,filter);

  if(topics.length===0){alert('⚠️ 該範圍沒有可用課題，請調整篩選條件');return;}

  const lang=getQuizLang(subject);
  let questions=[];
  if(selectedQuizType==='fill'){
    questions=genFillQuestions(topics,count,lang);
  } else if(selectedQuizType==='match'){
    questions=genMatchQuestions(topics,count,lang);
  } else if(selectedQuizType==='short'){
    questions=genShortQuestions(topics,count,lang);
  } else if(selectedQuizType==='peel'){
    questions=genPEELQuestions(topics,count,lang);
  } else {
    // mixed: include all 4 types
    const fillC=Math.max(2,Math.ceil(count*0.3));
    const peelC=Math.max(1,Math.ceil(count*0.2));
    const matchC=1;
    const shortC=Math.max(1,count-fillC-peelC-matchC*4);
    questions=[
      ...genFillQuestions(topics,fillC,lang),
      ...genPEELQuestions(topics,peelC,lang),
      ...genMatchQuestions(topics,matchC,lang),
      ...genShortQuestions(topics,shortC,lang)
    ].sort(()=>Math.random()-0.5).slice(0,count);
  }

  if(questions.length===0){alert('⚠️ 知識庫資料不足以生成題目，請先補充課題內容');return;}

  quizState={type:selectedQuizType,questions:questions,answers:new Array(questions.length).fill(''),startTime:Date.now(),timerInterval:null,subject:subject,filter:filter};

  // Switch UI
  document.getElementById('quiz-setup-area').style.display='none';
  document.getElementById('quiz-in-progress').style.display='block';
  document.getElementById('quiz-result').style.display='none';

  renderQuizQuestions();
  startQuizTimer();
}

function startQuizTimer(){
  quizState.startTime=Date.now();
  if(quizState.timerInterval) clearInterval(quizState.timerInterval);
  quizState.timerInterval=setInterval(()=>{
    const elapsed=Math.floor((Date.now()-quizState.startTime)/1000);
    const m=String(Math.floor(elapsed/60)).padStart(2,'0');
    const s=String(elapsed%60).padStart(2,'0');
    const timerEl=document.getElementById('quiz-timer');
    if(timerEl) timerEl.textContent='⏱️ '+m+':'+s;
  },1000);
}

    } else if(q.type==='match'){

          <div>
            <div style="font-size:12px;font-weight:600;color:var(--warm-accent);margin-bottom:6px;">配對項</div>
            ${shuffledVals.map((p,i)=>`<div style="padding:8px 12px;background:var(--warm-bg);border-radius:6px;margin-bottom:4px;font-size:13px;cursor:pointer;" class="quiz-match-val" data-val="${p.val.replace(/"/g,'&quot;')}" onclick="toggleMatchSelect(this,${idx})">${p.val}</div>`).join('')}

    } else if(q.type==='peel'){
      const isEnQ=q.question.match(/[a-zA-Z]/)&&!q.question.match(/[\u4e00-\u9fff]/);
      const showBtn=isEnQ?'📐 Show PEEL Structure Hints':'📐 顯示 PEEL 答題結構提示';
      const hideBtn=isEnQ?'📐 Hide PEEL Structure Hints':'📐 隱藏 PEEL 答題結構提示';
      const hintTitle=isEnQ?'📐 PEEL Structure Hints':'📐 PEEL 答題結構提示';
      const pLabel=isEnQ?'P — Point: State your position clearly':'P — 論點：明確表達你的立場';
      const e1Label=isEnQ?'E — Evidence: Support with specific historical facts':'E — 論據：用具體史實支持論點';
      const e2Label=isEnQ?'E — Explanation: Explain how evidence supports your point':'E — 解釋：解釋論據如何支持論點';
      const lLabel=isEnQ?'L — Link: Summarise and link back to the question':'L — 扣題：總結並扣回題目';
      const placeholder=isEnQ?'Answer using PEEL structure:\nP (Point): ...\nE (Evidence): ...\nE (Explanation): ...\nL (Link): ...':'用PEEL結構作答：\nP（論點）：...\nE（論據）：...\nE（解釋）：...\nL（扣題）：...';
      html+=`<div class="quiz-q-card" style="border-left-color:var(--warm-accent);border-left-width:5px;">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          <span class="quiz-q-num" style="background:var(--warm-accent);">${idx+1}</span>
          <span class="quiz-q-text">${q.question}</span>
          <span style="background:var(--warm-bg);color:var(--warm-accent);font-size:11px;padding:2px 8px;border-radius:4px;font-weight:600;">DSE PEEL</span>
          ${q.dseRecord?`<span style="background:#E8EAF6;color:#4527A0;font-size:10px;padding:2px 8px;border-radius:4px;">📋 ${q.dseRecord}</span>`:''}
        </div>
        <div style="margin-top:8px;">
          <button type="button" class="btn btn-sm btn-outline" onclick="togglePeelHint('peel-hint-${idx}','${hideBtn}','${showBtn}')" id="peel-btn-${idx}" style="font-size:12px;">${showBtn}</button>
        </div>
        <div id="peel-hint-${idx}" style="display:none;background:linear-gradient(135deg,#E8EAF6,#EDE7F6);padding:12px 16px;border-radius:8px;margin-top:8px;font-size:12px;color:#4527A0;">
          <div style="font-weight:700;margin-bottom:6px;">${hintTitle}</div>
          <div style="margin:2px 0;"><span style="color:var(--peel-p);font-weight:700;">P</span> — ${pLabel}</div>
          <div style="margin:2px 0;"><span style="color:var(--peel-e1);font-weight:700;">E</span> — ${e1Label}</div>
          <div style="margin:2px 0;"><span style="color:var(--peel-e2);font-weight:700;">E</span> — ${e2Label}</div>
          <div style="margin:2px 0;"><span style="color:var(--peel-l);font-weight:700;">L</span> — ${lLabel}</div>
        </div>
        <div class="quiz-answer-area">
          <textarea class="form-textarea" id="quiz-ans-${idx}" rows="5" placeholder="${placeholder}" oninput="quizState.answers[${idx}]=this.value"></textarea>
        </div>
      </div>`;
    }
  });
  container.innerHTML=html;
  updateQuizProgress(0);
}

function selectFillOption(el,qIdx){
  // Deselect other options in same question
  const siblings=el.parentElement.querySelectorAll('.quiz-opt');
  siblings.forEach(s=>s.classList.remove('selected'));
  el.classList.add('selected');
  quizState.answers[qIdx]=el.dataset.val;
}

function togglePeelHint(hintId,hideText,showText){
  const el=document.getElementById(hintId);
  if(!el) return;
  const btn=document.getElementById(hintId.replace('peel-hint-','peel-btn-'));
  if(el.style.display==='none'){
    el.style.display='block';
    if(btn) btn.textContent=hideText||'📐 隱藏 PEEL 答題結構提示';
  } else {
    el.style.display='none';
    if(btn) btn.textContent=showText||'📐 顯示 PEEL 答題結構提示';
  }
}

// Track match selection order per question
const matchSelections={};

function toggleMatchSelect(el,qIdx){
  if(!matchSelections[qIdx]) matchSelections[qIdx]=[];
  const val=el.dataset.val;
  const idx=matchSelections[qIdx].indexOf(val);
  if(idx>=0){
    matchSelections[qIdx].splice(idx,1);
    el.style.outline='none';
    el.style.fontWeight='normal';
  } else {
    matchSelections[qIdx].push(val);
    el.style.outline='3px solid var(--primary)';
    el.style.fontWeight='600';
  }
  // Update display
  const orderEl=document.getElementById('quiz-match-order-'+qIdx);
  if(orderEl){
    const q=quizState.questions[qIdx];
    orderEl.innerHTML=matchSelections[qIdx].length>0?'已選順序：'+matchSelections[qIdx].map((v,i)=>`<strong>${i+1}.</strong>${v}`).join(' → '):'';
  }
  // Save answers
  if(q=quizState.questions[qIdx]){
    quizState.answers[qIdx]=JSON.stringify(matchSelections[qIdx]||[]);
  }
}

function updateQuizProgress(currentIdx){
  const total=quizState.questions.length;
  document.getElementById('quiz-progress-text').textContent=(currentIdx+1)+'/'+total;
  document.getElementById('quiz-progress-fill').style.width=Math.round(((currentIdx+1)/total)*100)+'%';
}

function submitQuiz(){
  if(quizState.timerInterval) clearInterval(quizState.timerInterval);
  const elapsed=Math.floor((Date.now()-quizState.startTime)/1000);

  let correct=0;
  let detailHtml='';

  quizState.questions.forEach((q,idx)=>{
    const userAns=(quizState.answers[idx]||'').trim();
    let isCorrect=false;
    let explanation='';
    let userDisplay=userAns;

    if(q.type==='fill'){
      // Compare with correct answer
      const correctAns=q.answer.trim();
      if(!userAns){
        isCorrect=false;
      } else if(userAns===correctAns){
        isCorrect=true;
      } else {
        // Flexible matching for text input fallback
        const correctParts=correctAns.split(/[，、,；;。\s]+/).filter(s=>s.length>1);
        const matchedParts=correctParts.filter(p=>userAns.includes(p));
        isCorrect=matchedParts.length>=Math.max(2,Math.ceil(correctParts.length*0.5));
      }
      explanation=`<div style="font-size:12px;color:var(--gray-500);margin-top:4px;">📝 正確答案：${correctAns}</div>`;
    } else if(q.type==='match'){
      // Compare order
      const userOrder=matchSelections[idx]||[];
      const correctOrder=q.pairs.map(p=>p.val);
      let matchCount=0;
      userOrder.forEach((v,i)=>{
        if(v===correctOrder[i]) matchCount++;
      });
      isCorrect=matchCount>=Math.ceil(q.pairs.length*0.6);
      const correctPairs=q.pairs.map(p=>`<strong>${p.key}</strong> → ${p.val}`).join('；');
      explanation=`<div style="font-size:12px;color:var(--gray-500);margin-top:4px;">📝 正確配對：${correctPairs}</div>`;
      userDisplay=userOrder.map((v,i)=>`${i+1}. ${v}`).join('；')||'未作答';
    } else if(q.type==='short'){
      // Short answer: show reference, mark as correct if user wrote something substantial
      const correctAns=q.answer.trim();
      const correctParts=correctAns.split(/[，、,；;。\s]+/).filter(s=>s.length>1);
      const userParts=userAns.split(/[，、,；;。\s]+/).filter(s=>s.length>1);
      if(userParts.length>=2){
        const overlap=correctParts.filter(p=>userAns.includes(p));
        isCorrect=overlap.length>=Math.max(1,Math.ceil(correctParts.length*0.3));
      }
      explanation=`<div style="font-size:12px;color:var(--gray-500);margin-top:4px;">📝 參考答案：${correctAns}</div>`;
    } else if(q.type==='peel'){
      // PEEL answer: check if user included key PEEL elements
      const correctAns=q.answer.trim();
      const correctParts=correctAns.split(/[，、,；;。\s]+/).filter(s=>s.length>1);
      const userParts=userAns.split(/[，、,；;。\s]+/).filter(s=>s.length>1);
      // Check for PEEL structure indicators
      const hasP=userAns.length>5;
      const hasPEEL=userAns.includes('P')||userAns.includes('論點')||userAns.includes('E')||userAns.includes('論據')||userAns.includes('L')||userAns.includes('扣題');
      // Check content overlap
      let contentMatch=0;
      if(userParts.length>=3){
        const overlap=correctParts.filter(p=>userAns.includes(p));
        contentMatch=overlap.length;
      }
      isCorrect=hasP&&(hasPEEL||contentMatch>=Math.max(1,Math.ceil(correctParts.length*0.3)));
      // Build detailed PEEL structure reference (hidden by default)
      const peelDetailId='peel-result-'+idx;
      explanation=`<div style="margin-top:6px;">
        <button type="button" class="btn btn-sm btn-outline" onclick="togglePeelHint('${peelDetailId}')" style="font-size:12px;">📐 顯示 PEEL 答題結構參考</button>
        <div id="${peelDetailId}" style="display:none;background:linear-gradient(135deg,#E8EAF6,#EDE7F6);padding:10px 14px;border-radius:8px;margin-top:6px;font-size:12px;color:#4527A0;">
          <div style="font-weight:700;margin-bottom:4px;">📐 PEEL 答題結構參考</div>
          ${q.peelHints||'暫無結構參考'}
          ${q.commonMistakes?`<div style="margin-top:8px;color:#C62828;">⚠️ 考生常犯：${q.commonMistakes}</div>`:''}
          ${q.answerTips?`<div style="margin-top:4px;color:#2E7D32;">💡 答題貼士：${q.answerTips}</div>`:''}
        </div>
      </div>`;
    }

    if(isCorrect) correct++;

    const icon=isCorrect?'✅':'❌';
    const cls=isCorrect?'correct-item':'wrong-item';
    const topicTag=q.topic?`<span style="font-size:11px;background:var(--cool-bg);color:var(--cool);padding:2px 8px;border-radius:4px;margin-left:6px;">${q.topic}</span>`:'';
    const typeTag=q.type==='peel'?'<span style="background:var(--warm-bg);color:var(--warm-accent);font-size:10px;padding:2px 6px;border-radius:4px;margin-left:4px;">PEEL</span>':q.type==='fill'?'<span style="background:#E8F5E9;color:var(--success);font-size:10px;padding:2px 6px;border-radius:4px;margin-left:4px;">填充</span>':q.type==='match'?'<span style="background:var(--cool-bg);color:var(--cool);font-size:10px;padding:2px 6px;border-radius:4px;margin-left:4px;">配對</span>':'<span style="background:#F3E5F5;color:var(--peel-l);font-size:10px;padding:2px 6px;border-radius:4px;margin-left:4px;">短答</span>';

    detailHtml+=`<div class="quiz-detail-item ${cls}">
      <div>${icon} <strong>第${idx+1}題</strong>${typeTag}${topicTag}</div>
      <div style="font-size:13px;margin-top:4px;">${q.type==='match'?q.label:q.question}</div>
      <div style="font-size:13px;margin-top:4px;color:var(--primary);">你的答案：${userDisplay||'未作答'}</div>
      ${!isCorrect?explanation:'<div style="font-size:12px;color:var(--success);margin-top:4px;">✓ 答對了！</div>'}
      ${isCorrect&&q.type!=='match'&&q.type!=='peel'?explanation:''}
      ${isCorrect&&q.type==='peel'?explanation:''}
    </div>`;
  });

  const total=quizState.questions.length;
  const pct=Math.round((correct/total)*100);
  let msg='';
  if(pct>=90) msg='🏆 太厲害了！你已經掌握得很好！';
  else if(pct>=70) msg='👏 唔錯！繼續努力就可以更好！';
  else if(pct>=50) msg='💪 仲有進步空間，多溫幾次就得！';
  else msg='📖 需要加把勁！建議先溫習相關課題再測驗';

  document.getElementById('quiz-score').textContent=correct+'/'+total;
  document.getElementById('quiz-score-msg').textContent=msg;
  document.getElementById('quiz-detail').innerHTML=detailHtml;

  // Save history
  saveQuizHistory(quizState.subject,quizState.filter,quizState.type,correct,total,elapsed);

  // Switch UI
  document.getElementById('quiz-in-progress').style.display='none';
  document.getElementById('quiz-result').style.display='block';

  // Reset match selections
  Object.keys(matchSelections).forEach(k=>delete matchSelections[k]);
}

function saveQuizHistory(subject,filter,type,correct,total,elapsed){
  const history=JSON.parse(localStorage.getItem('dse_quiz_history')||'[]');
  history.unshift({
    date:new Date().toLocaleString('zh-HK'),
    subject,filter,type,correct,total,elapsed,
    pct:Math.round((correct/total)*100)
  });
  if(history.length>50) history.length=50;
  localStorage.setItem('dse_quiz_history',JSON.stringify(history));
  loadQuizHistory();
}

function loadQuizHistory(){
  const history=JSON.parse(localStorage.getItem('dse_quiz_history')||'[]');
  const container=document.getElementById('quiz-history-list');
  if(history.length===0){
    container.innerHTML='<div style="text-align:center;color:var(--gray-500);padding:20px;font-size:13px;">暫無測驗記錄，開始第一次測驗吧！</div>';
    return;
  }
  container.innerHTML=history.slice(0,10).map(h=>{
    const pctColor=h.pct>=70?'var(--success)':h.pct>=50?'#FF9800':'var(--danger)';
    const m=Math.floor(h.elapsed/60);const s=h.elapsed%60;
    return `<div class="quiz-history-item">
      <span>${h.date}</span>
      <span>${h.subject}${h.filter!=='全部'?' · '+h.filter:''}</span>
      <span style="color:${pctColor};font-weight:600;">${h.correct}/${h.total} (${h.pct}%)</span>
      <span style="color:var(--gray-500);">${m}分${s}秒</span>
    </div>`;
  }).join('');
}

function retryQuiz(){
  document.getElementById('quiz-result').style.display='none';
  startQuiz();
}

function backToQuizSetup(){
  document.getElementById('quiz-result').style.display='none';
  document.getElementById('quiz-in-progress').style.display='none';
  document.getElementById('quiz-setup-area').style.display='block';
}

function saveGeneratedNote(){
  const subject=document.getElementById('gen-subject').value;
  const titleSelect=document.getElementById('gen-title-select');
  const titleInput=document.getElementById('gen-title');
  if(titleSelect.style.display!=='none' && titleSelect.value && titleSelect.value!=='__custom__'){
    titleInput.value=titleSelect.value;
  }
  const title=titleInput.value||'未命名課題';
  const sKey=subject==='中史'?'chhist':subject==='世史'?'whist':'csd';
  // Collect all textarea/input values from the generated form
  const contentParts=[];
  document.querySelectorAll('#gen-result-content textarea, #gen-result-content input[type=text]').forEach(el=>{
    if(el.value.trim()){
      const label=el.previousElementSibling||el.parentElement.querySelector('label');
      const labelText=label?label.textContent.replace(/[：:]$/,'').trim():'';
      if(labelText) contentParts.push(`【${labelText}】${el.value.trim()}`);
      else contentParts.push(el.value.trim());
    }
  });
  const data=getData(KEYS.notes);
  if(!data[sKey]) data[sKey]=[];
  data[sKey].push({
    id:uid(), topic:title, subtopic:document.getElementById('gen-time').value||'',
    content:contentParts.join('\n'), keywords:document.getElementById('gen-people').value||'',
    dse:'否', dseType:'', dseYear:'', testQ:'', testA:'', prof:'1', remarks:'由筆記生成器建立'
  });
  setData(KEYS.notes,data);
  alert('✅ 已儲存到'+subject+'筆記！');
}

function copyGenOutput(){
  const el=document.getElementById('gen-result-content');
  const text=el.innerText;
  navigator.clipboard.writeText(text).then(()=>alert('已複製到剪貼簿！'));
}

function doExport(){
  const subject=document.getElementById('exp-subject').value;
  const filter=document.getElementById('exp-filter').value;
  const notes=getData(KEYS.notes);
  const prac=getData(KEYS.prac);
  const sKeys=subject==='全部'?['chhist','whist','csd']:[subject==='中史'?'chhist':subject==='世史'?'whist':'csd'];
  const pKeys=subject==='全部'?['eng','math','chi']:[];

  let html=`<html><head><meta charset="UTF-8"><title>DSE筆記匯出</title>
  <style>body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;padding:30px;color:#333;max-width:800px;margin:0 auto;}
  h1{color:#1B3A5C;text-align:center;border-bottom:3px solid #1B3A5C;padding-bottom:10px;}
  h2{color:#8B4513;margin-top:24px;} h3{color:#2E5090;margin-top:16px;}
  .note{border-left:4px solid #8B4513;padding:10px 16px;margin:10px 0;background:#FFF8E1;border-radius:0 8px 8px 0;}
  .note .title{font-weight:700;font-size:15px;color:#1B3A5C;} .note .content{margin-top:6px;white-space:pre-wrap;font-size:13px;line-height:1.7;}
  .dse-tag{display:inline-block;background:#FFEBEE;color:#C0392B;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;margin:2px;}
  .self-test{background:#F5F5F5;padding:8px 12px;border-radius:6px;margin-top:8px;font-size:13px;}
  table{width:100%;border-collapse:collapse;margin-top:10px;font-size:12px;}
  th{background:#1B3A5C;color:#fff;padding:8px;text-align:left;} td{padding:8px;border-bottom:1px solid #ddd;}
  .error{color:#C0392B;font-weight:600;} .improve{color:#2E7D32;font-weight:600;}
  .meta{font-size:11px;color:#999;margin-top:10px;text-align:center;}
  </style></head><body>`;
  html+=`<h1>DSE 筆記匯出</h1><div class="meta">匯出日期：${new Date().toLocaleString('zh-HK')} | 科目：${subject} | 篩選：${filter==='all'?'全部':filter==='dse'?'DSE曾出現':'熟練度1-2'}</div>`;

  sKeys.forEach(key=>{
    let items=notes[key]||[];
    if(filter==='dse') items=items.filter(n=>n.dse==='是');
    if(filter==='low') items=items.filter(n=>n.prof&&parseInt(n.prof)<=2);
    if(!items.length) return;
    html+=`<h2>📖 ${subjMap[key]} 筆記</h2>`;
    items.forEach(n=>{
      html+=`<div class="note"><div class="title">${n.topic} — ${n.subtopic}</div>`;
      if(n.content) html+=`<div class="content">${n.content}</div>`;
      if(n.keywords) html+=`<div style="margin-top:4px;font-size:12px;color:#8B4513;">🔑 ${n.keywords}</div>`;
      if(n.dse==='是'){
        html+=`<div style="margin-top:4px;">`;
        html+=`<span class="dse-tag">📊 DSE已出現 ${n.dseYear||''}</span>`;
        (n.dseType||'').split('/').filter(Boolean).forEach(t=>html+=`<span class="dse-tag">${t}</span>`);
        html+=`</div>`;
      }
      if(n.testQ) html+=`<div class="self-test">❓ ${n.testQ}<br>💡 ${n.testA||''}</div>`;
      if(n.prof) html+=`<div style="margin-top:4px;font-size:12px;color:#666;">熟練度：${n.prof}/5</div>`;
      html+=`</div>`;
    });
  });

  pKeys.forEach(key=>{
    const records=prac[key]||[];
    if(!records.length) return;
    html+=`<h2>✏️ ${pracMap[key]} 操練記錄</h2><table><tr><th>日期</th><th>類型</th><th>題號</th><th>得分</th><th>錯誤</th><th>改善</th></tr>`;
    records.forEach(r=>{
      html+=`<tr><td>${r.date||''}</td><td>${r.type||r.topic||''}</td><td>${r.qNum||''}</td><td>${r.score||''}</td><td class="error">${r.errorType||''}</td><td class="improve">${r.improve||r.solution||''}</td></tr>`;
    });
    html+=`</table>`;
  });

  html+=`</body></html>`;

  if(exportType==='print'){
    const w=window.open('','_blank');
    w.document.write(html);
    w.document.close();
    setTimeout(()=>w.print(),500);
  } else {
    const blob=new Blob([html],{type:'text/html'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download=`DSE筆記_${subject}_${new Date().toISOString().slice(0,10)}.html`;
    a.click();
    URL.revokeObjectURL(url);
    alert('✅ 已下載！用瀏覽器開啟後可按 Ctrl+P 列印為 PDF');
  }
}
