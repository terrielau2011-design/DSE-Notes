<!DOCTYPE html><html><head><meta charset="UTF-8"><title>建立DSE筆記系統</title></head><body style="font-family:sans-serif;text-align:center;padding:60px">
<h1 style="color:#1B3A5C">📚 DSE筆記系統</h1>
<p style="color:#666">按下面按鈕建立並下載完整筆記系統</p>
<button onclick="go()" style="padding:15px 50px;font-size:20px;cursor:pointer;background:#1B3A5C;color:#fff;border:none;border-radius:12px;margin-top:20px">🚀 一鍵建立</button>
<div id="msg" style="margin-top:20px;color:#2E7D32;font-weight:bold"></div>
<script>
function go(){
var d=document.getElementById('c').textContent;
var b=new Blob([d],{type:'text/html;charset=utf-8'});
var a=document.createElement('a');
a.href=URL.createObjectURL(b);
a.download='DSE筆記系統.html';
a.click();
document.getElementById('msg').textContent='✅ 已下載！雙擊 DSE筆記系統.html 即可使用';
}
</script>
<script id="c" type="text/plain">
</script>
</body></html>
